<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>贪吃蛇</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            touch-action: none;
            overflow: hidden;
        }
        
        .game-container {
            text-align: center;
            padding: 20px;
        }
        
        h1 {
            color: #00ff88;
            margin-bottom: 10px;
            font-size: 28px;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }
        
        .score-board {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 15px;
            color: #fff;
            font-size: 18px;
        }
        
        .score-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 20px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        #gameCanvas {
            border: 3px solid #00ff88;
            border-radius: 10px;
            background: #0a0a1a;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
            max-width: 100%;
            touch-action: none;
        }
        
        .controls {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        
        .control-row {
            display: flex;
            gap: 10px;
        }
        
        .btn {
            width: 60px;
            height: 60px;
            border: none;
            border-radius: 15px;
            background: linear-gradient(145deg, #00ff88, #00cc6a);
            color: #1a1a2e;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 255, 136, 0.4);
            transition: all 0.1s;
            -webkit-tap-highlight-color: transparent;
        }
        
        .btn:active {
            transform: scale(0.95);
            box-shadow: 0 2px 10px rgba(0, 255, 136, 0.3);
        }
        
        .btn-secondary {
            background: linear-gradient(145deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            padding: 40px;
            border-radius: 20px;
            border: 2px solid #ff4444;
            text-align: center;
            color: white;
            display: none;
            z-index: 100;
        }
        
        .game-over h2 {
            color: #ff4444;
            font-size: 32px;
            margin-bottom: 20px;
        }
        
        .game-over p {
            font-size: 20px;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🐍 贪吃蛇</h1>
        
        <div class="score-board">
            <div class="score-item">得分：<span id="score">0</span></div>
            <div class="score-item">最高：<span id="highScore">0</span></div>
        </div>
        
        <canvas id="gameCanvas" width="300" height="300"></canvas>
        
        <div class="controls">
            <div class="control-row">
                <button class="btn" id="btnUp">↑</button>
            </div>
            <div class="control-row">
                <button class="btn" id="btnLeft">←</button>
                <button class="btn btn-secondary" id="btnStart">开始</button>
                <button class="btn" id="btnRight">→</button>
            </div>
            <div class="control-row">
                <button class="btn" id="btnDown">↓</button>
            </div>
        </div>
    </div>
    
    <div class="game-over" id="gameOver">
        <h2>游戏结束!</h2>
        <p>得分：<span id="finalScore">0</span></p>
        <button class="btn btn-secondary" onclick="resetGame()">再来一局</button>
    </div>

    <script>
        // 游戏配置
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gridSize = 15;
        const tileCount = canvas.width / gridSize;
        
        // 游戏状态
        let snake = [];
        let food = {};
        let direction = 'right';
        let nextDirection = 'right';
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameLoop = null;
        let gameSpeed = 150;
        let isGameRunning = false;
        
        // 初始化显示最高分
        document.getElementById('highScore').textContent = highScore;
        
        // 初始化游戏
        function initGame() {
            snake = [
                {x: 5, y: 10},
                {x: 4, y: 10},
                {x: 3, y: 10}
            ];
            direction = 'right';
            nextDirection = 'right';
            score = 0;
            document.getElementById('score').textContent = score;
            placeFood();
        }
        
        // 放置食物
        function placeFood() {
            do {
                food = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
            } while (snake.some(segment => segment.x === food.x && segment.y === food.y));
        }
        
        // 绘制游戏
        function draw() {
            // 清空画布
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制网格（可选）
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            for (let i = 0; i < tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }
            
            // 绘制蛇
            snake.forEach((segment, index) => {
                const gradient = ctx.createRadialGradient(
                    segment.x * gridSize + gridSize/2,
                    segment.y * gridSize + gridSize/2,
                    0,
                    segment.x * gridSize + gridSize/2,
                    segment.y * gridSize + gridSize/2,
                    gridSize/2
                );
                
                if (index === 0) {
                    // 蛇头
                    gradient.addColorStop(0, '#00ff88');
                    gradient.addColorStop(1, '#00cc6a');
                } else {
                    // 蛇身
                    gradient.addColorStop(0, '#00dd77');
                    gradient.addColorStop(1, '#00aa55');
                }
                
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.roundRect(
                    segment.x * gridSize + 1,
                    segment.y * gridSize + 1,
                    gridSize - 2,
                    gridSize - 2,
                    4
                );
                ctx.fill();
                
                // 绘制蛇眼睛
                if (index === 0) {
                    ctx.fillStyle = '#fff';
                    const eyeSize = 3;
                    const eyeOffset = 4;
                    
                    if (direction === 'right') {
                        ctx.beginPath();
                        ctx.arc(segment.x * gridSize + gridSize - eyeOffset, segment.y * gridSize + 5, eyeSize, 0, Math.PI * 2);
                        ctx.arc(segment.x * gridSize + gridSize - eyeOffset, segment.y * gridSize + gridSize - 5, eyeSize, 0, Math.PI * 2);
                        ctx.fill();
                    } else if (direction === 'left') {
                        ctx.beginPath();
                        ctx.arc(segment.x * gridSize + eyeOffset, segment.y * gridSize + 5, eyeSize, 0, Math.PI * 2);
                        ctx.arc(segment.x * gridSize + eyeOffset, segment.y * gridSize + gridSize - 5, eyeSize, 0, Math.PI * 2);
                        ctx.fill();
                    } else if (direction === 'up') {
                        ctx.beginPath();
                        ctx.arc(segment.x * gridSize + 5, segment.y * gridSize + eyeOffset, eyeSize, 0, Math.PI * 2);
                        ctx.arc(segment.x * gridSize + gridSize - 5, segment.y * gridSize + eyeOffset, eyeSize, 0, Math.PI * 2);
                        ctx.fill();
                    } else if (direction === 'down') {
                        ctx.beginPath();
                        ctx.arc(segment.x * gridSize + 5, segment.y * gridSize + gridSize - eyeOffset, eyeSize, 0, Math.PI * 2);
                        ctx.arc(segment.x * gridSize + gridSize - 5, segment.y * gridSize + gridSize - eyeOffset, eyeSize, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            });
            
            // 绘制食物
            const foodGradient = ctx.createRadialGradient(
                food.x * gridSize + gridSize/2,
                food.y * gridSize + gridSize/2,
                0,
                food.x * gridSize + gridSize/2,
                food.y * gridSize + gridSize/2,
                gridSize/2
            );
            foodGradient.addColorStop(0, '#ff6b6b');
            foodGradient.addColorStop(1, '#ee5a5a');
            
            ctx.fillStyle = foodGradient;
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize/2,
                food.y * gridSize + gridSize/2,
                gridSize/2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();
            
            // 食物光晕
            ctx.shadowColor = '#ff6b6b';
            ctx.shadowBlur = 10;
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize/2,
                food.y * gridSize + gridSize/2,
                gridSize/2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();
            ctx.shadowBlur = 0;
        }
        
        // 更新游戏状态
        function update() {
            direction = nextDirection;
            
            const head = {x: snake[0].x, y: snake[0].y};
            
            switch(direction) {
                case 'up': head.y--; break;
                case 'down': head.y++; break;
                case 'left': head.x--; break;
                case 'right': head.x++; break;
            }
            
            // 检查碰撞
            if (head.x < 0 || head.x >= tileCount || 
                head.y < 0 || head.y >= tileCount ||
                snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                gameOver();
                return;
            }
            
            snake.unshift(head);
            
            // 检查是否吃到食物
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('score').textContent = score;
                placeFood();
                
                // 加速
                if (gameSpeed > 80) {
                    gameSpeed -= 2;
                    clearInterval(gameLoop);
                    gameLoop = setInterval(gameStep, gameSpeed);
                }
            } else {
                snake.pop();
            }
        }
        
        // 游戏步骤
        function gameStep() {
            update();
            draw();
        }
        
        // 游戏结束
        function gameOver() {
            clearInterval(gameLoop);
            isGameRunning = false;
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                document.getElementById('highScore').textContent = highScore;
            }
            
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').style.display = 'block';
        }
        
        // 重置游戏
        function resetGame() {
            document.getElementById('gameOver').style.display = 'none';
            gameSpeed = 150;
            initGame();
            draw();
            startGame();
        }
        
        // 开始游戏
        function startGame() {
            if (isGameRunning) return;
            isGameRunning = true;
            document.getElementById('btnStart').textContent = '进行中';
            gameLoop = setInterval(gameStep, gameSpeed);
        }
        
        // 停止游戏
        function stopGame() {
            clearInterval(gameLoop);
            isGameRunning = false;
            document.getElementById('btnStart').textContent = '开始';
        }
        
        // 改变方向
        function changeDirection(newDirection) {
            const opposites = {
                'up': 'down',
                'down': 'up',
                'left': 'right',
                'right': 'left'
            };
            
            if (opposites[newDirection] !== direction) {
                nextDirection = newDirection;
            }
        }
        
        // 按钮事件
        document.getElementById('btnUp').addEventListener('click', () => changeDirection('up'));
        document.getElementById('btnDown').addEventListener('click', () => changeDirection('down'));
        document.getElementById('btnLeft').addEventListener('click', () => changeDirection('left'));
        document.getElementById('btnRight').addEventListener('click', () => changeDirection('right'));
        
        document.getElementById('btnStart').addEventListener('click', () => {
            if (isGameRunning) {
                stopGame();
            } else {
                if (snake.length === 0) initGame();
                startGame();
            }
        });
        
        // 键盘控制
        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'ArrowUp': case 'w': case 'W': changeDirection('up'); break;
                case 'ArrowDown': case 's': case 'S': changeDirection('down'); break;
                case 'ArrowLeft': case 'a': case 'A': changeDirection('left'); break;
                case 'ArrowRight': case 'd': case 'D': changeDirection('right'); break;
                case ' ': 
                    if (isGameRunning) stopGame();
                    else {
                        if (snake.length === 0) initGame();
                        startGame();
                    }
                    break;
            }
        });
        
        // 触摸滑动控制
        let touchStartX = 0;
        let touchStartY = 0;
        
        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
            e.preventDefault();
        }, {passive: false});
        
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
        }, {passive: false});
        
        canvas.addEventListener('touchend', (e) => {
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            
            const dx = touchEndX - touchStartX;
            const dy = touchEndY - touchStartY;
            
            if (Math.abs(dx) > Math.abs(dy)) {
                if (dx > 30) changeDirection('right');
                else if (dx < -30) changeDirection('left');
            } else {
                if (dy > 30) changeDirection('down');
                else if (dy < -30) changeDirection('up');
            }
            
            e.preventDefault();
        }, {passive: false});
        
        // 初始绘制
        initGame();
        draw();
    </script>
</body>
</html>
