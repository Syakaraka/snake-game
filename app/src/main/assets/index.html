    <!-- 设置面板 -->
    <div class="settings-panel" id="settingsPanel">
        <h2>⚙️ 设置</h2>
        <div class="setting-item">
            <span>音效开关</span>
            <div class="toggle-switch" id="soundToggle" onclick="toggleSound()"></div>
        </div>
        <div class="setting-item">
            <span>音效音量</span>
            <input type="range" id="volumeSlider" min="0" max="100" value="30" 
                onchange="updateVolume(this.value)" style="width: 120px;">
        </div>
        <div class="setting-item">
            <span>背景音乐</span>
            <input type="range" id="bgmSlider" min="0" max="50" value="15" 
                onchange="updateBGMVolume(this.value)" style="width: 120px;">
        </div>
        <button class="btn btn-secondary" onclick="closeSettings()" style="margin-top: 20px;">关闭</button>
    </div>

    <script>
        // ==================== 游戏配置 ====================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gridSize = 15;
        const tileCount = canvas.width / gridSize;
        
        // ==================== 粒子系统 ====================
        let particles = [];
        
        // ==================== 音效系统增强版 ====================
        const soundSettings = {
            enabled: true,
            volume: 0.3,
            bgmVolume: 0.15,
            toggle: function() {
                this.enabled = !this.enabled;
                localStorage.setItem('snakeSoundEnabled', this.enabled);
                if (this.enabled) {
                    initBGM();
                } else {
                    stopBGM();
                }
            }
        };
        
        // 初始化音效设置
        const savedSound = localStorage.getItem('snakeSoundEnabled');
        if (savedSound !== null) {
            soundSettings.enabled = savedSound === 'true';
        }
        
        // 音频上下文
        let audioCtx = null;
        let bgmOscillators = [];
        let bgmGain = null;
        let isBGMPlaying = false;
        
        // 初始化音频上下文（用户交互后调用）
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }
        
        // 背景音乐 - 优化版：更好听的和弦进行和音色
        let bgmIntervalId = null;
        let bgmNoteIndex = 0;
        
        function initBGM() {
            if (!soundSettings.enabled || isBGMPlaying) return;
            
            // 确保音频上下文已初始化
            initAudio();
            
            // 停止之前的 BGM
            stopBGM();
            
            try {
                bgmGain = audioCtx.createGain();
                bgmGain.gain.value = soundSettings.bgmVolume * 0.8; // 稍微降低总体音量
                bgmGain.connect(audioCtx.destination);
                
                // 优化版和弦进行：C - Em - Am - F - G - Em - F - G (更丰富的进行)
                // 使用分解和弦（arpeggio）而非同时播放，更柔和
                const chordProgression = [
                    // C major (C-E-G)
                    { notes: [261.63, 329.63, 392.00], duration: 250 },
                    // E minor (E-G-B)
                    { notes: [329.63, 392.00, 493.88], duration: 250 },
                    // A minor (A-C-E)
                    { notes: [440.00, 523.25, 659.25], duration: 250 },
                    // F major (F-A-C)
                    { notes: [349.23, 440.00, 523.25], duration: 250 },
                    // G major (G-B-D)
                    { notes: [392.00, 493.88, 587.33], duration: 250 },
                    // E minor (E-G-B)
                    { notes: [329.63, 392.00, 493.88], duration: 250 },
                    // F major (F-A-C)
                    { notes: [349.23, 440.00, 523.25], duration: 250 },
                    // G major (G-B-D) + C bass
                    { notes: [261.63, 392.00, 493.88, 587.33], duration: 500 },
                ];
                
                function playNextNote() {
                    if (!isBGMPlaying) return;
                    
                    const chord = chordProgression[bgmNoteIndex];
                    const now = audioCtx.currentTime;
                    const noteDuration = chord.duration / 1000;
                    
                    // 播放当前和弦的所有音符（分解和弦方式）
                    chord.notes.forEach((freq, i) => {
                        const osc = audioCtx.createOscillator();
                        const gain = audioCtx.createGain();
                        
                        // 使用三角波，更温暖柔和
                        osc.type = 'triangle';
                        osc.frequency.value = freq;
                        
                        // 更平滑的包络
                        gain.gain.setValueAtTime(0, now + i * 0.05);
                        gain.gain.linearRampToValueAtTime(0.06, now + i * 0.05 + 0.05);
                        gain.gain.linearRampToValueAtTime(0.04, now + i * 0.05 + noteDuration * 0.7);
                        gain.gain.linearRampToValueAtTime(0, now + i * 0.05 + noteDuration);
                        
                        osc.connect(gain);
                        gain.connect(bgmGain);
                        osc.start(now + i * 0.05);
                        osc.stop(now + i * 0.05 + noteDuration);
                        bgmOscillators.push(osc);
                    });
                    
                    // 移动到下一个和弦
                    bgmNoteIndex = (bgmNoteIndex + 1) % chordProgression.length;
                    
                    // 安排下一个和弦
                    const nextDelay = chordProgression[bgmNoteIndex].duration;
                    if (isBGMPlaying) {
                        bgmIntervalId = setTimeout(playNextNote, nextDelay);
                    }
                }
                
                // 立即播放第一个和弦
                playNextNote();
                
                isBGMPlaying = true;
            } catch (e) {
                console.warn('BGM 初始化失败:', e);
            }
        }
        
        function stopBGM() {
            // 停止所有振荡器
            bgmOscillators.forEach(osc => {
                try { osc.stop(); } catch(e) {}
            });
            bgmOscillators = [];
            
            // 断开增益节点
            if (bgmGain) {
                bgmGain.disconnect();
                bgmGain = null;
            }
            
            // 清除定时器
            if (bgmIntervalId) {
                clearInterval(bgmIntervalId);
                bgmIntervalId = null;
            }
            
            isBGMPlaying = false;
        }
        
        // 增强的音效系统
        function playSound(type) {
            if (!soundSettings.enabled) return;
            initAudio();
            
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            gainNode.gain.value = soundSettings.volume;
            
            switch(type) {
                case 'eat':
                    // 吃食物：清脆的"叮"声（双音）
                    oscillator.type = 'sine';
                    oscillator.frequency.setValueAtTime(880, audioCtx.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(1760, audioCtx.currentTime + 0.08);
                    gainNode.gain.setValueAtTime(soundSettings.volume, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                    oscillator.start(audioCtx.currentTime);
                    oscillator.stop(audioCtx.currentTime + 0.2);
                    
                    // 添加和声
                    const harmony = audioCtx.createOscillator();
                    const harmGain = audioCtx.createGain();
                    harmony.type = 'sine';
                    harmony.frequency.setValueAtTime(1100, audioCtx.currentTime);
                    harmony.frequency.exponentialRampToValueAtTime(2200, audioCtx.currentTime + 0.08);
                    harmGain.gain.setValueAtTime(soundSettings.volume * 0.5, audioCtx.currentTime);
                    harmGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                    harmony.connect(harmGain);
                    harmGain.connect(audioCtx.destination);
                    harmony.start(audioCtx.currentTime);
                    harmony.stop(audioCtx.currentTime + 0.15);
                    break;
                    
                case 'turn':
                    // 转向：轻微"滴"声
                    oscillator.type = 'triangle';
                    oscillator.frequency.setValueAtTime(660, audioCtx.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.05);
                    gainNode.gain.setValueAtTime(soundSettings.volume * 0.4, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                    oscillator.start(audioCtx.currentTime);
                    oscillator.stop(audioCtx.currentTime + 0.1);
                    break;
                    
                case 'powerup':
                    // 吃到道具：上升的"嘀嘀"声（三段音阶）
                    oscillator.type = 'square';
                    oscillator.frequency.setValueAtTime(523, audioCtx.currentTime);
                    oscillator.frequency.linearRampToValueAtTime(784, audioCtx.currentTime + 0.1);
                    oscillator.frequency.linearRampToValueAtTime(1047, audioCtx.currentTime + 0.2);
                    gainNode.gain.setValueAtTime(soundSettings.volume * 0.5, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                    oscillator.start(audioCtx.currentTime);
                    oscillator.stop(audioCtx.currentTime + 0.3);
                    break;
                    
                case 'start':
                    // 游戏开始：上升音阶
                    const startFreqs = [523, 659, 784, 1047];
                    startFreqs.forEach((freq, i) => {
                        const osc = audioCtx.createOscillator();
                        const gain = audioCtx.createGain();
                        osc.type = 'sine';
                        osc.frequency.value = freq;
                        gain.gain.setValueAtTime(0, audioCtx.currentTime + i * 0.1);
                        gain.gain.linearRampToValueAtTime(soundSettings.volume, audioCtx.currentTime + i * 0.1 + 0.05);
                        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.1 + 0.2);
                        osc.connect(gain);
                        gain.connect(audioCtx.destination);
                        osc.start(audioCtx.currentTime + i * 0.1);
                        osc.stop(audioCtx.currentTime + i * 0.1 + 0.2);
                    });
                    return;
                    
                case 'pause':
                    // 暂停：下降音
                    oscillator.type = 'triangle';
                    oscillator.frequency.setValueAtTime(880, audioCtx.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(440, audioCtx.currentTime + 0.15);
                    gainNode.gain.setValueAtTime(soundSettings.volume * 0.5, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                    oscillator.start(audioCtx.currentTime);
                    oscillator.stop(audioCtx.currentTime + 0.2);
                    break;
                    
                case 'gameover':
                    // 游戏结束：长下降音
                    oscillator.type = 'sawtooth';
                    oscillator.frequency.setValueAtTime(440, audioCtx.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(55, audioCtx.currentTime + 0.8);
                    gainNode.gain.setValueAtTime(soundSettings.volume * 0.6, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.0);
                    oscillator.start(audioCtx.currentTime);
                    oscillator.stop(audioCtx.currentTime + 1.0);
                    stopBGM();
                    break;
            }
        }
        
        // ==================== 震动反馈 ====================
        function vibrate(pattern) {
            if (navigator.vibrate) {
                navigator.vibrate(pattern);
            }
        }
        
        function createParticles(x, y, color, count = 8) {
            // 限制粒子总数，防止性能问题
            const maxParticles = 200;
            const availableSlots = maxParticles - particles.length;
            const actualCount = Math.min(count, availableSlots);
            
            if (actualCount <= 0) return;
            
            for (let i = 0; i < actualCount; i++) {
                particles.push({
                    x: x * gridSize + gridSize / 2,
                    y: y * gridSize + gridSize / 2,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8,
                    life: 1.0,
                    decay: 0.02 + Math.random() * 0.03,
                    color: color,
                    size: 2 + Math.random() * 3
                });
            }
        }
        
        function updateParticles() {
            particles = particles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.2; // 重力
                p.life -= p.decay;
                return p.life > 0;
            });
        }
        
        function drawParticles() {
            particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1.0;
        }
        
        // 难度配置（速度：ms/帧，数值越大越慢）
        const difficultyConfig = {
            easy: { speed: 300, powerUpRate: 0.4, name: '简单' },
            normal: { speed: 220, powerUpRate: 0.25, name: '正常' },
            hard: { speed: 150, powerUpRate: 0.15, name: '困难' }
        };
        
        let currentDifficulty = 'normal';
        
        // 食物类型
        const foodTypes = {
            normal: { color: '#ff6b6b', score: 10, chance: 0.85, glow: '#ff6b6b' },
            rare: { color: '#a855f7', score: 20, chance: 0.10, glow: '#a855f7' },
            legendary: { color: '#ffd700', score: 50, chance: 0.05, glow: '#ffd700', disappearTime: 3000 }
        };
        
        // 道具类型
        const powerUpTypes = {
            speed: { color: '#00ffff', effect: '加速', duration: 5000, icon: '⚡' },
            slow: { color: '#00ff00', effect: '减速', duration: 5000, icon: '🐢' },
            ghost: { color: '#ffffff', effect: '穿墙', duration: 5000, icon: '👻' },
            shrink: { color: '#ff69b4', effect: '缩短', duration: 0, icon: '✂️' },
            magnet: { color: '#ff69b4', effect: '磁铁', duration: 8000, icon: '🧲' },
            invincible: { color: '#ffd700', effect: '无敌', duration: 5000, icon: '🛡️' },
            doubleScore: { color: '#ff1493', effect: '双倍得分', duration: 10000, icon: '2️⃣' }
        };
        
        // 游戏模式
        const gameModes = {
            classic: { name: '经典模式', description: '传统玩法，无限制' },
            timed: { name: '限时模式', time: 60, description: '60 秒内获得最高分' },
            survival: { name: '生存模式', obstacles: true, description: '躲避障碍物生存' }
        };
        
        // 蛇皮肤系统
        const snakeSkins = {
            classic: { 
                id: 'classic', 
                name: '经典绿', 
                colors: ['#00ff88', '#00cc6a', '#00aa55'],
                unlockCondition: (stats) => true,
                unlocked: true
            },
            blue: { 
                id: 'blue', 
                name: '冰蓝', 
                colors: ['#00bfff', '#0099cc', '#007799'],
                unlockCondition: (stats) => stats.totalScore >= 1000,
                unlocked: false
            },
            purple: { 
                id: 'purple', 
                name: '紫晶', 
                colors: ['#bf00ff', '#9900cc', '#770099'],
                unlockCondition: (stats) => stats.totalScore >= 3000,
                unlocked: false
            },
            gold: { 
                id: 'gold', 
                name: '黄金', 
                colors: ['#ffd700', '#ccaa00', '#aa8800'],
                unlockCondition: (stats) => stats.highScore >= 500,
                unlocked: false
            },
            rainbow: { 
                id: 'rainbow', 
                name: '彩虹', 
                colors: ['#ff0000', '#ff7700', '#ffff00', '#00ff00', '#0000ff', '#8b00ff'],
                unlockCondition: (stats) => stats.achievementsUnlocked >= 4,
                unlocked: false
            },
            fire: { 
                id: 'fire', 
                name: '火焰', 
                colors: ['#ff4500', '#ff6600', '#ff8800'],
                unlockCondition: (stats) => stats.maxCombo >= 15,
                unlocked: false
            },
            ice: { 
                id: 'ice', 
                name: '寒冰', 
                colors: ['#e0ffff', '#afeeee', '#87cefa'],
                unlockCondition: (stats) => stats.gamesPlayed >= 50,
                unlocked: false
            },
            dark: { 
                id: 'dark', 
                name: '暗黑', 
                colors: ['#4b0082', '#800080', '#9370db'],
                unlockCondition: (stats) => stats.totalScore >= 10000,
                unlocked: false
            }
        };
        
        // 加载已解锁的皮肤
        const unlockedSkins = JSON.parse(localStorage.getItem('snakeSkins') || '{}');
        Object.keys(unlockedSkins).forEach(key => {
            if (snakeSkins[key]) snakeSkins[key].unlocked = true;
        });
        
        // 当前选择的皮肤
        let currentSkin = localStorage.getItem('snakeCurrentSkin') || 'classic';
        
        // 成就系统
        const achievements = {
            firstBlood: { id: 'firstBlood', name: '首血', desc: '首次得分达到 100 分', condition: (s) => s.score >= 100, unlocked: false },
            snakeMaster: { id: 'snakeMaster', name: '蛇大师', desc: '单次得分达到 500 分', condition: (s) => s.score >= 500, unlocked: false },
            legendKiller: { id: 'legendKiller', name: '传奇杀手', desc: '吃到 10 个传奇食物', condition: (s) => s.legendaryEaten >= 10, unlocked: false },
            comboKing: { id: 'comboKing', name: '连击之王', desc: '达成 10 连击', condition: (s) => s.maxCombo >= 10, unlocked: false },
            survivor: { id: 'survivor', name: '生存专家', desc: '在生存模式下得分 200 分', condition: (s) => s.survivalScore >= 200, unlocked: false },
            timeMaster: { id: 'timeMaster', name: '时间大师', desc: '在限时模式下得分 300 分', condition: (s) => s.timedScore >= 300, unlocked: false },
            powerUpCollector: { id: 'powerUpCollector', name: '道具收藏家', desc: '收集 20 个道具', condition: (s) => s.powerUpsCollected >= 20, unlocked: false },
            marathon: { id: 'marathon', name: '马拉松', desc: '蛇长度达到 50', condition: (s) => s.snakeLength >= 50, unlocked: false }
        };
        
        // ==================== 游戏状态 ====================
        let snake = [];
        let foods = [];
        let powerUps = [];
        let obstacles = []; // 障碍物数组
        let direction = 'right';
        let nextDirection = 'right';
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameLoop = null;
        let animationFrame = null;
        let baseGameSpeed = 150;
        let currentGameSpeed = 150;
        let isGameRunning = false;
        let isPaused = false;
        let combo = 0;
        let lastEatTime = 0;
        let activePowerUps = [];
        let isWallPassThrough = false;
        let lastUpdateTime = 0;
        let foodGlowPhase = 0; // 食物发光动画相位
        let powerUpIndicatorCache = ''; // 缓存道具指示器 HTML，避免频繁重绘
        let powerUpUpdateInterval = null; // 道具倒计时更新定时器
        
        // 游戏模式状态
        let currentGameMode = 'classic';
        let gameTime = 0; // 限时模式剩余时间
        let gameTimerInterval = null;
        let isInvincible = false; // 无敌状态
        
        // 成就进度
        let achievementProgress = {
            legendaryEaten: 0,
            maxCombo: 0,
            survivalScore: 0,
            timedScore: 0,
            powerUpsCollected: 0,
            snakeLength: 0
        };
        
        // 加载已解锁的成就
        const unlockedAchievements = JSON.parse(localStorage.getItem('snakeAchievements') || '{}');
        Object.keys(unlockedAchievements).forEach(key => {
            if (achievements[key]) achievements[key].unlocked = true;
        });
        
        // 游戏统计数据
        let gameStats = JSON.parse(localStorage.getItem('snakeStats') || '{}');
        gameStats = {
            totalScore: gameStats.totalScore || 0,
            highScore: gameStats.highScore || 0,
            gamesPlayed: gameStats.gamesPlayed || 0,
            achievementsUnlocked: gameStats.achievementsUnlocked || 0,
            maxCombo: gameStats.maxCombo || 0,
            totalPowerUps: gameStats.totalPowerUps || 0
        };
        
        // 单局统计
        let sessionStats = {
            startTime: 0,
            endTime: 0,
            finalScore: 0,
            finalLength: 0,
            maxCombo: 0,
            powerUpsCollected: 0
        };
        
        // ==================== 定时器管理（修复内存泄漏）====================
        let activeTimers = [];
        
        function scheduleTimer(callback, delay) {
            const timerId = setTimeout(() => {
                callback();
                const index = activeTimers.indexOf(timerId);
                if (index > -1) activeTimers.splice(index, 1);
            }, delay);
            activeTimers.push(timerId);
            return timerId;
        }
        
        function clearAllTimers() {
            activeTimers.forEach(id => clearTimeout(id));
            activeTimers = [];
        }
        
        document.getElementById('highScore').textContent = highScore;
        
        // 初始化音效开关状态
        updateSoundToggle();
        
        // 渲染皮肤选择器
        renderSkinSelector();
        
        // ==================== 游戏控制 ====================
        function selectDifficulty(diff) {
            currentDifficulty = diff;
            document.querySelectorAll('.difficulty-btn').forEach(btn => {
                btn.classList.remove('selected');
            });
            document.querySelector(`.difficulty-btn.${diff}`).classList.add('selected');
            document.getElementById('difficulty').textContent = difficultyConfig[diff].name;
            document.getElementById('gameSpeed').textContent = difficultyConfig[diff].speed;
        }
        
        function selectGameMode(mode) {
            currentGameMode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.classList.remove('selected');
            });
            document.querySelector(`.mode-btn.${mode}`).classList.add('selected');
        }
        
        // 皮肤系统
        function renderSkinSelector() {
            const container = document.getElementById('skinSelector');
            if (!container) return;
            
            // 检查解锁条件
            Object.values(snakeSkins).forEach(skin => {
                if (!skin.unlocked && skin.unlockCondition(gameStats)) {
                    skin.unlocked = true;
                    unlockedSkins[skin.id] = true;
                    localStorage.setItem('snakeSkins', JSON.stringify(unlockedSkins));
                }
            });
            
            container.innerHTML = Object.values(snakeSkins).map(skin => {
                const gradient = `linear-gradient(135deg, ${skin.colors[0]}, ${skin.colors[skin.colors.length - 1]})`;
                const selected = skin.id === currentSkin ? 'selected' : '';
                const locked = skin.unlocked ? '' : 'locked';
                return `<div class="skin-btn ${selected} ${locked}" 
                    style="background: ${gradient}"
                    onclick="selectSkin('${skin.id}')"
                    title="${skin.name}${skin.unlocked ? '' : ' (未解锁)'}">
                    <div class="skin-name">${skin.name}</div>
                </div>`;
            }).join('');
        }
        
        function selectSkin(skinId) {
            if (!snakeSkins[skinId].unlocked) {
                // 播放锁定音效
                playSound('turn');
                return;
            }
            currentSkin = skinId;
            localStorage.setItem('snakeCurrentSkin', currentSkin);
            renderSkinSelector();
        }
        
        function getSkinColors() {
            return snakeSkins[currentSkin] ? snakeSkins[currentSkin].colors : snakeSkins.classic.colors;
        }
        
        // 成就系统
        function checkAchievements() {
            const state = {
                score: score,
                legendaryEaten: achievementProgress.legendaryEaten,
                maxCombo: achievementProgress.maxCombo,
                survivalScore: currentGameMode === 'survival' ? score : achievementProgress.survivalScore,
                timedScore: currentGameMode === 'timed' ? score : achievementProgress.timedScore,
                powerUpsCollected: achievementProgress.powerUpsCollected,
                snakeLength: snake.length
            };
            
            Object.values(achievements).forEach(ach => {
                if (!ach.unlocked && ach.condition(state)) {
                    unlockAchievement(ach);
                }
            });
        }
        
        function unlockAchievement(achievement) {
            achievement.unlocked = true;
            unlockedAchievements[achievement.id] = true;
            localStorage.setItem('snakeAchievements', JSON.stringify(unlockedAchievements));
            
            // 显示成就通知
            const popup = document.getElementById('achievementPopup');
            document.getElementById('achievementText').textContent = achievement.desc;
            popup.classList.add('show');
            
            // 播放音效
            playSound('powerup');
            
            // 3 秒后隐藏
            setTimeout(() => {
                popup.classList.remove('show');
            }, 3000);
        }
        
        // 生成障碍物（生存模式）
        function generateObstacles(count = 5) {
            obstacles = [];
            for (let i = 0; i < count; i++) {
                let obstacle;
                let attempts = 0;
                do {
                    obstacle = {
                        x: Math.floor(Math.random() * tileCount),
                        y: Math.floor(Math.random() * tileCount),
                        width: Math.floor(Math.random() * 2) + 1,
                        height: Math.floor(Math.random() * 2) + 1
                    };
                    attempts++;
                } while (
                    attempts < 50 &&
                    (snake.some(s => Math.abs(s.x - obstacle.x) < 5 && Math.abs(s.y - obstacle.y) < 5) ||
                     obstacle.x < 5 || obstacle.y < 5) // 远离蛇和边界
                );
                if (attempts < 50) obstacles.push(obstacle);
            }
        }
        
        function startGameFromMenu() {
            document.getElementById('startScreen').style.display = 'none';
            initAudio(); // 初始化音频
            playSound('start'); // 播放开始音效
            initBGM(); // 开始背景音乐
            initGame();
            startGame();
        }
        
        function initGame() {
            // 重置单局统计
            sessionStats.startTime = Date.now();
            sessionStats.maxCombo = 0;
            sessionStats.powerUpsCollected = 0;
            achievementProgress.powerUpsCollected = 0;
            
            snake = [
                {x: 5, y: 10},
                {x: 4, y: 10},
                {x: 3, y: 10}
            ];
            direction = 'right';
            nextDirection = 'right';
            score = 0;
            combo = 0;
            foods = [];
            powerUps = [];
            activePowerUps = [];
            isWallPassThrough = false;
            isInvincible = false;
            baseGameSpeed = difficultyConfig[currentDifficulty].speed;
            currentGameSpeed = baseGameSpeed;
            
            // 游戏模式初始化
            if (currentGameMode === 'timed') {
                gameTime = gameModes.timed.time;
                document.getElementById('timerDisplay').style.display = 'block';
                document.getElementById('timerValue').textContent = gameTime;
                document.getElementById('timerDisplay').classList.remove('warning');
            } else {
                document.getElementById('timerDisplay').style.display = 'none';
            }
            
            // 生存模式生成障碍物
            if (currentGameMode === 'survival') {
                generateObstacles(8);
            } else {
                obstacles = [];
            }
            
            document.getElementById('score').textContent = score;
            document.getElementById('comboDisplay').style.display = 'none';
            updatePowerUpIndicator();
            placeFood();
        }
        
        function placeFood() {
            const rand = Math.random();
            let type = 'normal';
            if (rand < foodTypes.legendary.chance) type = 'legendary';
            else if (rand < foodTypes.rare.chance + foodTypes.legendary.chance) type = 'rare';
            
            let newFood;
            do {
                newFood = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount),
                    type: type
                };
            } while (snake.some(segment => segment.x === newFood.x && segment.y === newFood.y));
            
            foods.push(newFood);
            
            // 传奇食物会在 3 秒后消失
            if (type === 'legendary') {
                scheduleTimer(() => {
                    const index = foods.findIndex(f => f === newFood);
                    if (index !== -1) foods.splice(index, 1);
                }, foodTypes.legendary.disappearTime);
            }
            
            // 随机生成道具
            if (Math.random() < difficultyConfig[currentDifficulty].powerUpRate) {
                placePowerUp();
            }
        }
        
        function placePowerUp() {
            const types = Object.keys(powerUpTypes);
            const type = types[Math.floor(Math.random() * types.length)];
            
            let newPowerUp;
            do {
                newPowerUp = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount),
                    type: type
                };
            } while (
                snake.some(segment => segment.x === newPowerUp.x && segment.y === newPowerUp.y) ||
                foods.some(food => food.x === newPowerUp.x && food.y === newPowerUp.y)
            );
            
            powerUps.push(newPowerUp);
            
            // 道具 8 秒后消失
            scheduleTimer(() => {
                const index = powerUps.findIndex(p => p === newPowerUp);
                if (index !== -1) powerUps.splice(index, 1);
            }, 8000);
        }
        
        function activatePowerUp(type) {
            const config = powerUpTypes[type];
            
            if (type === 'shrink') {
                // 立即缩短
                for (let i = 0; i < 3 && snake.length > 2; i++) {
                    snake.pop();
                }
            } else {
                // 持续性效果
                activePowerUps.push({ type, endTime: Date.now() + config.duration });
                
                if (type === 'speed') {
                    currentGameSpeed = baseGameSpeed * 0.8;
                    document.getElementById('gameSpeed').textContent = Math.round(currentGameSpeed);
                } else if (type === 'slow') {
                    currentGameSpeed = baseGameSpeed * 1.2;
                    document.getElementById('gameSpeed').textContent = Math.round(currentGameSpeed);
                } else if (type === 'ghost') {
                    isWallPassThrough = true;
                } else if (type === 'invincible') {
                    isInvincible = true;
                    snake[0].color = '#ffd700'; // 蛇头变金色
                } else if (type === 'magnet') {
                    // 磁铁效果：吸引附近食物
                    attractFood();
                }
                // doubleScore 不需要特殊处理，在吃食物时计算
                
                // 立即强制更新一次显示（新道具出现）
                updatePowerUpIndicator(true);
                
                // 效果结束后恢复
                scheduleTimer(() => {
                    activePowerUps = activePowerUps.filter(p => p.type !== type);
                    if (type === 'speed' || type === 'slow') {
                        currentGameSpeed = baseGameSpeed;
                        document.getElementById('gameSpeed').textContent = Math.round(currentGameSpeed);
                    } else if (type === 'ghost') {
                        isWallPassThrough = false;
                    } else if (type === 'invincible') {
                        isInvincible = false;
                        snake[0].color = null;
                    }
                    // 强制更新（道具消失）
                    updatePowerUpIndicator(true);
                }, config.duration);
            }
        }
        
        // 磁铁效果：吸引附近食物
        function attractFood() {
            if (foods.length === 0) return;
            const head = snake[0];
            foods.forEach(food => {
                const dx = head.x - food.x;
                const dy = head.y - food.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 5 && dist > 0) {
                    // 向蛇的方向移动
                    food.x += Math.sign(dx);
                    food.y += Math.sign(dy);
                }
            });
        }
        
        function updatePowerUpIndicator(force = false) {
            const container = document.getElementById('powerUpIndicator');
            const now = Date.now();
            
            // 清理过期的道具效果
            activePowerUps = activePowerUps.filter(p => p.endTime > now);
            
            // 如果没有道具效果，清空显示
            if (activePowerUps.length === 0) {
                if (container.innerHTML !== '') {
                    container.innerHTML = '';
                    powerUpIndicatorCache = '';
                }
                return;
            }
            
            // 生成新的 HTML（使用稳定排序确保顺序一致）
            const newHtml = activePowerUps
                .sort((a, b) => a.type.localeCompare(b.type)) // 按类型排序，保持稳定
                .map(p => {
                    const config = powerUpTypes[p.type];
                    const remaining = Math.ceil((p.endTime - now) / 1000);
                    const criticalClass = remaining <= 3 ? ' critical' : '';
                    return `<div class="power-up-badge${criticalClass}">${config.icon} ${remaining}s</div>`;
                })
                .join('');
            
            // 只在内容真正变化时更新 DOM（避免闪烁）
            if (force || newHtml !== powerUpIndicatorCache) {
                container.innerHTML = newHtml;
                powerUpIndicatorCache = newHtml;
            }
        }
        
        // 启动道具倒计时更新器（每 500ms 更新一次，平衡流畅度和性能）
        function startPowerUpTimer() {
            if (powerUpUpdateInterval) clearInterval(powerUpUpdateInterval);
            powerUpUpdateInterval = setInterval(() => {
                if (isGameRunning && !isPaused) {
                    updatePowerUpIndicator();
                }
            }, 500);
        }
        
        function stopPowerUpTimer() {
            if (powerUpUpdateInterval) {
                clearInterval(powerUpUpdateInterval);
                powerUpUpdateInterval = null;
            }
        }
        
        function draw() {
            // 清空画布
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制粒子
            drawParticles();
            
            // 绘制网格
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            for (let i = 0; i < tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }
            
            // 绘制蛇（使用皮肤颜色）
            const skinColors = getSkinColors();
            snake.forEach((segment, index) => {
                const gradient = ctx.createRadialGradient(
                    segment.x * gridSize + gridSize/2,
                    segment.y * gridSize + gridSize/2,
                    0,
                    segment.x * gridSize + gridSize/2,
                    segment.y * gridSize + gridSize/2,
                    gridSize/2
                );
                
                const colorIndex = index % skinColors.length;
                if (index === 0) {
                    gradient.addColorStop(0, skinColors[0]);
                    gradient.addColorStop(1, skinColors[Math.min(1, skinColors.length - 1)]);
                } else {
                    gradient.addColorStop(0, skinColors[colorIndex]);
                    gradient.addColorStop(1, skinColors[Math.min(colorIndex + 1, skinColors.length - 1)]);
                }
                
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.roundRect(
                    segment.x * gridSize + 1,
                    segment.y * gridSize + 1,
                    gridSize - 2,
                    gridSize - 2,
                    4
                );
                ctx.fill();
                
                // 绘制蛇眼睛
                if (index === 0) {
                    ctx.fillStyle = '#fff';
                    const eyeSize = 3;
                    const eyeOffset = 4;
                    
                    if (direction === 'right') {
                        ctx.beginPath();
                        ctx.arc(segment.x * gridSize + gridSize - eyeOffset, segment.y * gridSize + 5, eyeSize, 0, Math.PI * 2);
                        ctx.arc(segment.x * gridSize + gridSize - eyeOffset, segment.y * gridSize + gridSize - 5, eyeSize, 0, Math.PI * 2);
                        ctx.fill();
                    } else if (direction === 'left') {
                        ctx.beginPath();
                        ctx.arc(segment.x * gridSize + eyeOffset, segment.y * gridSize + 5, eyeSize, 0, Math.PI * 2);
                        ctx.arc(segment.x * gridSize + eyeOffset, segment.y * gridSize + gridSize - 5, eyeSize, 0, Math.PI * 2);
                        ctx.fill();
                    } else if (direction === 'up') {
                        ctx.beginPath();
                        ctx.arc(segment.x * gridSize + 5, segment.y * gridSize + eyeOffset, eyeSize, 0, Math.PI * 2);
                        ctx.arc(segment.x * gridSize + gridSize - 5, segment.y * gridSize + eyeOffset, eyeSize, 0, Math.PI * 2);
                        ctx.fill();
                    } else if (direction === 'down') {
                        ctx.beginPath();
                        ctx.arc(segment.x * gridSize + 5, segment.y * gridSize + gridSize - eyeOffset, eyeSize, 0, Math.PI * 2);
                        ctx.arc(segment.x * gridSize + gridSize - 5, segment.y * gridSize + gridSize - eyeOffset, eyeSize, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            });
            
            // 绘制食物（带发光动画）
            foods.forEach(food => {
                const config = foodTypes[food.type];
                
                // 发光动画（呼吸效果）
                const glowIntensity = 10 + Math.sin(foodGlowPhase) * 5;
                const pulseSize = (gridSize/2 - 2) + Math.sin(foodGlowPhase * 2) * 1;
                
                // 外发光
                ctx.shadowColor = config.glow;
                ctx.shadowBlur = glowIntensity;
                
                // 食物渐变
                const foodGradient = ctx.createRadialGradient(
                    food.x * gridSize + gridSize/2,
                    food.y * gridSize + gridSize/2,
                    0,
                    food.x * gridSize + gridSize/2,
                    food.y * gridSize + gridSize/2,
                    gridSize/2
                );
                foodGradient.addColorStop(0, config.color);
                foodGradient.addColorStop(1, config.color);
                
                ctx.fillStyle = foodGradient;
                ctx.beginPath();
                ctx.arc(
                    food.x * gridSize + gridSize/2,
                    food.y * gridSize + gridSize/2,
                    pulseSize,
                    0,
                    Math.PI * 2
                );
                ctx.fill();
                ctx.shadowBlur = 0;
            });
            
            // 绘制道具
            powerUps.forEach(powerUp => {
                const config = powerUpTypes[powerUp.type];
                ctx.fillStyle = config.color;
                ctx.font = '12px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(config.icon, 
                    powerUp.x * gridSize + gridSize/2, 
                    powerUp.y * gridSize + gridSize/2);
            });
            
            // 绘制障碍物
            obstacles.forEach(obs => {
                const gradient = ctx.createLinearGradient(
                    obs.x * gridSize, obs.y * gridSize,
                    (obs.x + obs.width) * gridSize, (obs.y + obs.height) * gridSize
                );
                gradient.addColorStop(0, '#4a4a4a');
                gradient.addColorStop(1, '#2a2a2a');
                
                ctx.fillStyle = gradient;
                ctx.fillRect(
                    obs.x * gridSize,
                    obs.y * gridSize,
                    obs.width * gridSize,
                    obs.height * gridSize
                );
                
                // 障碍物边框
                ctx.strokeStyle = '#666';
                ctx.lineWidth = 2;
                ctx.strokeRect(
                    obs.x * gridSize,
                    obs.y * gridSize,
                    obs.width * gridSize,
                    obs.height * gridSize
                );
            });
        }
        
        function update() {
            direction = nextDirection;
            
            // 更新粒子
            updateParticles();
            
            const head = {x: snake[0].x, y: snake[0].y};
            
            switch(direction) {
                case 'up': head.y--; break;
                case 'down': head.y++; break;
                case 'left': head.x--; break;
                case 'right': head.x++; break;
            }
            
            // 检查穿墙模式
            if (isWallPassThrough) {
                if (head.x < 0) head.x = tileCount - 1;
                if (head.x >= tileCount) head.x = 0;
                if (head.y < 0) head.y = tileCount - 1;
                if (head.y >= tileCount) head.y = 0;
            } else {
                // 检查碰撞
                if (head.x < 0 || head.x >= tileCount || 
                    head.y < 0 || head.y >= tileCount ||
                    snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                    if (!isInvincible) { // 无敌状态下不会死亡
                        gameOver();
                        return;
                    }
                }
            }
            
            // 检查障碍物碰撞（生存模式）
            if (!isInvincible && obstacles.length > 0) {
                for (const obs of obstacles) {
                    if (head.x >= obs.x && head.x < obs.x + obs.width &&
                        head.y >= obs.y && head.y < obs.y + obs.height) {
                        gameOver();
                        return;
                    }
                }
            }
            
            snake.unshift(head);
            
            // 检查是否吃到食物
            const foodIndex = foods.findIndex(f => f.x === head.x && f.y === head.y);
            if (foodIndex !== -1) {
                const food = foods[foodIndex];
                const config = foodTypes[food.type];
                
                // 连击系统
                const now = Date.now();
                if (now - lastEatTime < 3000) {
                    combo++;
                    if (combo >= 2) {
                        const comboEl = document.getElementById('comboDisplay');
                        const comboCountEl = document.getElementById('comboCount');
                        comboEl.style.display = 'block';
                        comboCountEl.textContent = combo;
                        
                        // 连击特效
                        comboEl.classList.remove('combo-pop');
                        void comboEl.offsetWidth; // 触发重绘
                        comboEl.classList.add('combo-pop');
                        
                        // 根据连击数改变颜色
                        if (combo >= 10) {
                            comboEl.style.background = 'linear-gradient(145deg, #ffd700, #ffaa00)';
                        } else if (combo >= 5) {
                            comboEl.style.background = 'linear-gradient(145deg, #ff6b6b, #ee5a5a)';
                        }
                    }
                } else {
                    combo = 0;
                    document.getElementById('comboDisplay').style.display = 'none';
                }
                lastEatTime = now;
                
                // 更新最大连击记录
                if (combo > achievementProgress.maxCombo) achievementProgress.maxCombo = combo;
                
                // 计算得分（包含连击加成和双倍得分道具）
                const comboBonus = combo >= 2 ? 1 + (combo - 1) * 0.2 : 1;
                const doubleScoreBonus = activePowerUps.some(p => p.type === 'doubleScore') ? 2 : 1;
                score += Math.floor(config.score * comboBonus * doubleScoreBonus);
                document.getElementById('score').textContent = score;
                
                // 追踪传奇食物
                if (food.type === 'legendary') {
                    achievementProgress.legendaryEaten++;
                }
                
                // 生成粒子效果
                createParticles(food.x, food.y, config.color, 10);
                
                // 播放音效和震动
                playSound('eat');
                vibrate(30);
                
                foods.splice(foodIndex, 1);
                placeFood();
                
                // 渐进加速（每吃 5 个食物加速一次）
                if (score > 0 && score % 50 === 0 && currentGameSpeed > 80) {
                    currentGameSpeed -= 5;
                    document.getElementById('gameSpeed').textContent = Math.round(currentGameSpeed);
                }
            } else {
                snake.pop();
            }
            
            // 检查是否吃到道具
            const powerUpIndex = powerUps.findIndex(p => p.x === head.x && p.y === head.y);
            if (powerUpIndex !== -1) {
                const powerUp = powerUps[powerUpIndex];
                activatePowerUp(powerUp.type);
                powerUps.splice(powerUpIndex, 1);
                
                // 追踪道具收集成就
                achievementProgress.powerUpsCollected++;
                
                // 播放道具音效
                playSound('powerup');
                vibrate([50, 30, 50]);
            }
            
            // 注意：道具指示器现在由独立的定时器更新，不在这里调用
        }
        
        function gameStep(currentTime) {
            if (!isGameRunning) return;
            
            // 控制游戏速度
            if (!lastUpdateTime) lastUpdateTime = currentTime;
            const deltaTime = currentTime - lastUpdateTime;
            
            if (deltaTime >= currentGameSpeed) {
                lastUpdateTime = currentTime;
                
                // 更新食物发光动画
                foodGlowPhase += 0.1;
                
                if (!isPaused) {
                    update();
                    draw();
                }
            }
            
            animationFrame = requestAnimationFrame(gameStep);
        }
        
        let canRevive = true;
        
        function gameOver() {
            cancelAnimationFrame(animationFrame);
            clearInterval(gameLoop);
            clearAllTimers();
            stopPowerUpTimer(); // 停止道具倒计时更新器
            if (gameTimerInterval) clearInterval(gameTimerInterval); // 停止游戏计时器
            isGameRunning = false;
            
            // 记录单局统计
            sessionStats.endTime = Date.now();
            sessionStats.finalScore = score;
            sessionStats.finalLength = snake.length;
            if (combo > sessionStats.maxCombo) sessionStats.maxCombo = combo;
            
            // 更新成就进度
            achievementProgress.snakeLength = snake.length;
            if (currentGameMode === 'survival') achievementProgress.survivalScore = Math.max(achievementProgress.survivalScore, score);
            if (currentGameMode === 'timed') achievementProgress.timedScore = Math.max(achievementProgress.timedScore, score);
            
            // 检查成就
            checkAchievements();
            
            // 更新总统计数据
            gameStats.totalScore += score;
            gameStats.gamesPlayed++;
            if (score > gameStats.highScore) gameStats.highScore = score;
            if (sessionStats.maxCombo > gameStats.maxCombo) gameStats.maxCombo = sessionStats.maxCombo;
            gameStats.totalPowerUps += achievementProgress.powerUpsCollected;
            gameStats.achievementsUnlocked = Object.values(achievements).filter(a => a.unlocked).length;
            localStorage.setItem('snakeStats', JSON.stringify(gameStats));
            
            // 屏幕震动效果
            canvas.classList.add('shake');
            setTimeout(() => canvas.classList.remove('shake'), 300);
            
            // 播放音效和震动
            playSound('gameover');
            vibrate([100, 50, 100, 50, 200]);
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                document.getElementById('highScore').textContent = highScore;
            }
            
            // 更新游戏结束界面统计
            document.getElementById('statScore').textContent = score;
            document.getElementById('statHighScore').textContent = highScore;
            document.getElementById('statLength').textContent = snake.length;
            document.getElementById('statCombo').textContent = sessionStats.maxCombo + 'x';
            const gameTime = Math.floor((sessionStats.endTime - sessionStats.startTime) / 1000);
            document.getElementById('statTime').textContent = gameTime + 's';
            document.getElementById('statPowerUps').textContent = achievementProgress.powerUpsCollected;
            
            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalHighScore').textContent = highScore;
            
            document.getElementById('gameOver').style.display = 'block';
            document.getElementById('timerDisplay').style.display = 'none'; // 隐藏计时器
        }
        
        function startGame() {
            if (isGameRunning) return;
            isGameRunning = true;
            isPaused = false;
            lastUpdateTime = 0;
            document.getElementById('btnPause').textContent = '暂停';
            document.getElementById('gameSpeed').textContent = Math.round(currentGameSpeed);
            animationFrame = requestAnimationFrame(gameStep);
            startPowerUpTimer(); // 启动道具倒计时更新器
            
            // 限时模式计时器
            if (currentGameMode === 'timed') {
                if (gameTimerInterval) clearInterval(gameTimerInterval);
                gameTimerInterval = setInterval(() => {
                    gameTime--;
                    document.getElementById('timerValue').textContent = gameTime;
                    if (gameTime <= 10) {
                        document.getElementById('timerDisplay').classList.add('warning');
                    }
                    if (gameTime <= 0) {
                        gameOver();
                    }
                }, 1000);
            }
        }
        
        function togglePause() {
            if (!isGameRunning) return;
            
            isPaused = !isPaused;
            document.getElementById('btnPause').textContent = isPaused ? '继续' : '暂停';
            document.getElementById('pauseMenu').style.display = isPaused ? 'block' : 'none';
            
            if (isPaused) {
                playSound('pause');
                stopBGM(); // 暂停时停止 BGM
            } else {
                if (soundSettings.enabled && !isBGMPlaying) {
                    initBGM(); // 继续时恢复 BGM
                }
            }
        }
        
        function resumeGame() {
            isPaused = false;
            document.getElementById('pauseMenu').style.display = 'none';
            document.getElementById('btnPause').textContent = '暂停';
            playSound('start'); // 播放继续音效
            if (soundSettings.enabled && !isBGMPlaying) {
                initBGM(); // 恢复背景音乐
            }
        }
        
        function restartGame() {
            document.getElementById('pauseMenu').style.display = 'none';
            document.getElementById('gameOver').style.display = 'none';
            currentGameSpeed = baseGameSpeed;
            initGame();
            playSound('start');
            initBGM();
            startGame();
        }
        
        function playAgain() {
            document.getElementById('gameOver').style.display = 'none';
            currentGameSpeed = baseGameSpeed;
            initGame();
            playSound('start');
            initBGM();
            startGame();
        }
        
        function quitToMenu() {
            cancelAnimationFrame(animationFrame);
            clearInterval(gameLoop);
            clearAllTimers();
            stopPowerUpTimer(); // 停止道具倒计时更新器
            isGameRunning = false;
            isPaused = false;
            stopBGM(); // 停止背景音乐
            document.getElementById('pauseMenu').style.display = 'none';
            document.getElementById('gameOver').style.display = 'none';
            document.getElementById('startScreen').style.display = 'flex';
        }
        
        // ==================== 设置功能 ====================
        function openSettings() {
            document.getElementById('settingsPanel').style.display = 'block';
            updateSoundToggle();
            document.getElementById('volumeSlider').value = soundSettings.volume * 100;
            document.getElementById('bgmSlider').value = soundSettings.bgmVolume * 100;
        }
        
        function closeSettings() {
            document.getElementById('settingsPanel').style.display = 'none';
        }
        
        function toggleSound() {
            soundSettings.toggle();
            updateSoundToggle();
        }
        
        function updateVolume(value) {
            soundSettings.volume = value / 100;
            localStorage.setItem('snakeSoundVolume', soundSettings.volume);
        }
        
        function updateBGMVolume(value) {
            soundSettings.bgmVolume = value / 100;
            if (bgmGain) {
                bgmGain.gain.value = soundSettings.bgmVolume;
            }
            localStorage.setItem('snakeBGMVolume', soundSettings.bgmVolume);
        }
        
        function updateSoundToggle() {
            const toggle = document.getElementById('soundToggle');
            if (soundSettings.enabled) {
                toggle.classList.add('on');
            } else {
                toggle.classList.remove('on');
            }
        }
        
        // 加载音量设置
        const savedVolume = localStorage.getItem('snakeSoundVolume');
        if (savedVolume) soundSettings.volume = parseFloat(savedVolume);
        const savedBGMVolume = localStorage.getItem('snakeBGMVolume');
        if (savedBGMVolume) soundSettings.bgmVolume = parseFloat(savedBGMVolume);
        
        function changeDirection(newDirection) {
            const opposites = {
                'up': 'down',
                'down': 'up',
                'left': 'right',
                'right': 'left'
            };
            
            if (opposites[newDirection] !== direction && opposites[newDirection] !== nextDirection) {
                nextDirection = newDirection;
                // 播放转向音效（只在游戏进行中）
                if (isGameRunning && !isPaused) {
                    playSound('turn');
                }
            }
        }
        
        // 按钮事件
        document.getElementById('btnUp').addEventListener('click', () => changeDirection('up'));
        document.getElementById('btnDown').addEventListener('click', () => changeDirection('down'));
        document.getElementById('btnLeft').addEventListener('click', () => changeDirection('left'));
        document.getElementById('btnRight').addEventListener('click', () => changeDirection('right'));
        
        document.getElementById('btnPause').addEventListener('click', togglePause);
        
        // 键盘控制
        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'ArrowUp': case 'w': case 'W': changeDirection('up'); break;
                case 'ArrowDown': case 's': case 'S': changeDirection('down'); break;
                case 'ArrowLeft': case 'a': case 'A': changeDirection('left'); break;
                case 'ArrowRight': case 'd': case 'D': changeDirection('right'); break;
                case ' ': 
                    if (isGameRunning) togglePause();
                    else if (document.getElementById('startScreen').style.display !== 'none') startGameFromMenu();
                    break;
                case 'Escape':
                    if (isGameRunning) togglePause();
                    break;
                case 'm': case 'M':
                    // M 键静音快捷键
                    toggleSound();
                    break;
            }
        });
        
        // 触摸滑动控制（优化灵敏度）
        let touchStartX = 0;
        let touchStartY = 0;
        const SWIPE_THRESHOLD = 50; // 增加滑动阈值，减少误触
        
        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
            e.preventDefault();
        }, {passive: false});
        
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
        }, {passive: false});
        
        canvas.addEventListener('touchend', (e) => {
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            
            const dx = touchEndX - touchStartX;
            const dy = touchEndY - touchStartY;
            
            // 确保滑动距离足够大才响应
            if (Math.abs(dx) < SWIPE_THRESHOLD && Math.abs(dy) < SWIPE_THRESHOLD) {
                return; // 点击而非滑动，忽略
            }
            
            if (Math.abs(dx) > Math.abs(dy)) {
                if (dx > SWIPE_THRESHOLD) changeDirection('right');
                else if (dx < -SWIPE_THRESHOLD) changeDirection('left');
            } else {
                if (dy > SWIPE_THRESHOLD) changeDirection('down');
                else if (dy < -SWIPE_THRESHOLD) changeDirection('up');
            }
            
            e.preventDefault();
        }, {passive: false});
        
        // 初始绘制
        initGame();
        draw();
    </script>
</body>
</html>
