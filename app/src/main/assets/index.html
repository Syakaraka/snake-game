<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>贪吃蛇 - 经典增强版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            touch-action: none;
            overflow: hidden;
        }
        
        .game-container {
            text-align: center;
            padding: 15px 10px;
            max-width: 100%;
            max-height: 100vh;
            overflow-y: auto;
        }
        
        h1 {
            color: #00ff88;
            margin-bottom: 8px;
            font-size: 24px;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }
        
        .score-board {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 10px;
            color: #fff;
            font-size: 14px;
            flex-wrap: wrap;
        }
        
        .score-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 6px 12px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.2s;
            white-space: nowrap;
        }
        
        .score-item:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(1.05);
        }
        
        .score-item:active {
            transform: scale(0.95);
        }
        
        #gameCanvas {
            border: 3px solid #00ff88;
            border-radius: 10px;
            background: #0a0a1a;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
            max-width: 100%;
            max-height: calc(100vh - 350px);
            touch-action: none;
        }
        
        /* 响应式适配 */
        @media (max-height: 700px) {
            .controls {
                grid-template-columns: repeat(3, 50px);
                grid-template-rows: repeat(3, 50px);
                gap: 10px;
            }
            .btn {
                width: 50px;
                height: 50px;
                font-size: 18px;
            }
            h1 {
                font-size: 20px;
            }
            .score-board {
                font-size: 12px;
                gap: 6px;
            }
            .score-item {
                padding: 4px 10px;
            }
        }
        
        .controls {
            margin-top: 20px;
            display: grid;
            grid-template-columns: repeat(3, 55px);
            grid-template-rows: repeat(3, 55px);
            gap: 12px;
            justify-content: center;
            align-items: center;
        }
        
        .btn {
            width: 55px;
            height: 55px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(145deg, #00ff88, #00cc6a);
            color: #1a1a2e;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 3px 10px rgba(0, 255, 136, 0.4);
            transition: all 0.1s;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        
        .btn:active {
            transform: scale(0.95);
            box-shadow: 0 2px 10px rgba(0, 255, 136, 0.3);
        }
        
        .btn-secondary {
            background: linear-gradient(145deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-small {
            width: 50px;
            height: 50px;
            font-size: 16px;
        }
        
        /* 开始界面 */
        .start-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }
        
        .start-screen h1 {
            font-size: 42px;
            margin-bottom: 30px;
        }
        
        .difficulty-select {
            margin: 15px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        
        .difficulty-btn {
            padding: 16px 50px;
            font-size: 17px;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            width: 200px;
            position: relative;
            overflow: hidden;
        }
        
        .difficulty-btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.4s, height 0.4s;
        }
        
        .difficulty-btn:active::after {
            width: 300px;
            height: 300px;
        }
        
        .difficulty-btn.easy {
            background: linear-gradient(145deg, #00ff88, #00cc6a);
            color: #1a1a2e;
        }
        
        .difficulty-btn.normal {
            background: linear-gradient(145deg, #ffd700, #ffaa00);
            color: #1a1a2e;
        }
        
        .difficulty-btn.hard {
            background: linear-gradient(145deg, #ff4444, #cc0000);
            color: white;
        }
        
        .difficulty-btn.selected {
            transform: scale(1.08);
            box-shadow: 0 0 30px rgba(255,255,255,0.6);
            border: 2px solid #fff;
        }
        
        .difficulty-btn:hover:not(.selected) {
            transform: scale(1.05);
        }
        
        /* 暂停菜单 */
        .pause-menu {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            padding: 40px;
            border-radius: 20px;
            border: 2px solid #667eea;
            text-align: center;
            color: white;
            display: none;
            z-index: 150;
        }
        
        .pause-menu h2 {
            color: #667eea;
            font-size: 32px;
            margin-bottom: 30px;
        }
        
        .pause-menu .btn {
            margin: 10px;
            width: 150px;
        }
        
        /* 游戏结束界面 */
        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            padding: 30px 25px;
            border-radius: 20px;
            border: 2px solid #ff4444;
            text-align: center;
            color: white;
            display: none;
            z-index: 100;
            max-width: 90%;
            min-width: 280px;
        }
        
        .game-over h2 {
            color: #ff4444;
            font-size: 28px;
            margin-bottom: 15px;
            line-height: 1.3;
        }
        
        .game-over p {
            font-size: 18px;
            margin-bottom: 12px;
            word-wrap: break-word;
        }
        
        .game-over .btn {
            margin: 8px auto;
            display: block;
            width: 140px;
        }
        
        .combo-display {
            position: fixed;
            top: 20%;
            right: 20px;
            background: linear-gradient(145deg, #ff6b6b, #ee5a5a);
            padding: 15px 25px;
            border-radius: 30px;
            color: white;
            font-size: 24px;
            font-weight: bold;
            display: none;
            animation: pulse 0.5s ease-in-out infinite;
            z-index: 50;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .power-up-indicator {
            position: fixed;
            top: 85px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 50;
            pointer-events: none;
        }
        
        .power-up-badge {
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #667eea;
            border-radius: 20px;
            padding: 6px 14px;
            color: white;
            font-size: 13px;
            font-weight: bold;
            box-shadow: 0 2px 10px rgba(102, 126, 234, 0.5);
            white-space: nowrap;
        }
        
        .power-up-badge.critical {
            border-color: #ff4444;
            background: rgba(255, 68, 68, 0.4);
            animation: criticalPulse 0.8s ease-in-out infinite;
        }
        
        @keyframes criticalPulse {
            0%, 100% { 
                transform: scale(1);
                box-shadow: 0 2px 10px rgba(255, 68, 68, 0.5);
            }
            50% { 
                transform: scale(1.05);
                box-shadow: 0 2px 15px rgba(255, 68, 68, 0.8);
            }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* 屏幕震动动画 */
        @keyframes shake {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(-5px, 5px); }
            50% { transform: translate(5px, -5px); }
            75% { transform: translate(-5px, -5px); }
        }
        
        .shake {
            animation: shake 0.3s ease-in-out;
        }
        
        /* 设置面板 */
        .settings-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            padding: 30px;
            border-radius: 20px;
            border: 2px solid #667eea;
            text-align: center;
            color: white;
            display: none;
            z-index: 150;
            min-width: 300px;
        }
        
        .settings-panel h2 {
            color: #667eea;
            margin-bottom: 20px;
        }
        
        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 15px 0;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }
        
        .toggle-switch {
            width: 50px;
            height: 26px;
            background: #666;
            border-radius: 13px;
            position: relative;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .toggle-switch.on {
            background: #00ff88;
        }
        
        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 22px;
            height: 22px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: transform 0.3s;
        }
        
        .toggle-switch.on::after {
            transform: translateX(24px);
        }
        
        .legend {
            margin-top: 15px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            font-size: 12px;
            color: #aaa;
        }
        
        .legend-item {
            display: inline-block;
            margin: 5px 10px;
        }
        
        .legend-color {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 5px;
        }
        
        /* 皮肤选择器优化 */
        .skin-section {
            margin: 10px 0 15px 0;
        }
        
        .skin-section-title {
            color: #aaa;
            font-size: 12px;
            text-align: center;
            margin-bottom: 8px;
        }
        
        .skin-selector {
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
            max-width: 420px;
            margin: 0 auto;
        }
        
        .skin-btn {
            width: 55px;
            height: 55px;
            border: 3px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        
        .skin-btn:hover:not(.locked) {
            transform: scale(1.15);
            border-color: rgba(255,255,255,0.5);
            box-shadow: 0 6px 20px rgba(255,255,255,0.3);
        }
        
        .skin-btn.selected {
            border-color: #fff;
            box-shadow: 0 0 20px rgba(255,255,255,0.6);
            animation: skinPulse 1.5s ease-in-out infinite;
        }
        
        @keyframes skinPulse {
            0%, 100% { box-shadow: 0 0 20px rgba(255,255,255,0.6); }
            50% { box-shadow: 0 0 30px rgba(255,255,255,0.8); }
        }
        
        .skin-btn.locked {
            filter: grayscale(80%);
            opacity: 0.4;
            cursor: not-allowed;
            background: #333 !important;
        }
        
        .skin-btn.locked::after {
            content: '🔒';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            filter: none;
        }
        
        .skin-name {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.7);
            color: #fff;
            font-size: 10px;
            padding: 2px;
            text-align: center;
            opacity: 0;
            transition: opacity 0.2s;
        }
        
        .skin-btn:hover:not(.locked) .skin-name {
            opacity: 1;
        }
        
        /* 游戏结束统计面板 */
        .stats-panel {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 15px;
            margin: 15px 0;
            text-align: left;
        }
        
        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .stat-row:last-child {
            border-bottom: none;
        }
        
        .stat-label {
            color: #aaa;
        }
        
        .stat-value {
            color: #fff;
            font-weight: bold;
        }
        
        .stat-value.highlight {
            color: #00ff88;
        }
        
        /* 连击特效 */
        @keyframes comboPop {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }
        
        .combo-pop {
            animation: comboPop 0.3s ease-out;
        }
        
        /* 障碍物样式 */
        .obstacle {
            position: absolute;
            background: linear-gradient(145deg, #4a4a4a, #2a2a2a);
            border: 2px solid #666;
            border-radius: 4px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }
        
        /* 成就通知 */
        .achievement-popup {
            position: fixed;
            top: 80px;
            right: -350px;
            background: linear-gradient(145deg, #ffd700, #ffaa00);
            padding: 15px 20px;
            border-radius: 10px;
            color: #1a1a2e;
            font-weight: bold;
            box-shadow: 0 4px 20px rgba(255, 215, 0, 0.4);
            transition: right 0.5s ease-out;
            z-index: 100;
            max-width: 320px;
        }
        
        .achievement-popup.show {
            right: 20px;
        }
        
        .achievement-popup h4 {
            margin: 0 0 5px 0;
            font-size: 14px;
            color: #1a1a2e;
        }
        
        .achievement-popup p {
            margin: 0;
            font-size: 12px;
            color: #333;
        }
        
        /* 游戏模式选择优化 */
        .mode-select {
            margin: 15px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        
        .mode-row {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        
        .mode-btn {
            padding: 14px 28px;
            font-size: 15px;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
        }
        
        .mode-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }
        
        .mode-btn:hover::before {
            left: 100%;
        }
        
        .mode-btn.classic {
            background: linear-gradient(145deg, #00ff88, #00cc6a);
            color: #1a1a2e;
            min-width: 140px;
        }
        
        .mode-btn.timed {
            background: linear-gradient(145deg, #667eea, #764ba2);
            color: white;
            min-width: 140px;
        }
        
        .mode-btn.survival {
            background: linear-gradient(145deg, #ff4444, #cc0000);
            color: white;
            min-width: 140px;
        }
        
        .mode-btn.selected {
            transform: scale(1.08);
            box-shadow: 0 0 25px rgba(255,255,255,0.5);
            border: 2px solid #fff;
        }
        
        .mode-btn:hover:not(.selected) {
            transform: scale(1.05);
        }
        
        /* 计时器显示 */
        .timer-display {
            position: fixed;
            top: 85px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #ffd700;
            border-radius: 10px;
            padding: 8px 15px;
            color: #ffd700;
            font-size: 18px;
            font-weight: bold;
            display: none;
            z-index: 50;
        }
        
        .timer-display.warning {
            animation: pulse 0.5s ease-in-out infinite;
            border-color: #ff4444;
            color: #ff4444;
        }
    </style>
</head>
<body>
    <!-- 开始界面 -->
    <div class="start-screen" id="startScreen">
        <h1>🐍 贪吃蛇</h1>
        
        <!-- 蛇皮肤选择 -->
        <div class="skin-section">
            <div class="skin-section-title">选择皮肤</div>
            <div class="skin-selector" id="skinSelector">
                <!-- 皮肤按钮由 JS 生成 -->
            </div>
        </div>
        
        <!-- 游戏模式选择 -->
        <div class="mode-select">
            <div class="mode-row">
                <button class="mode-btn classic selected" onclick="selectGameMode('classic')">经典模式</button>
                <button class="mode-btn timed" onclick="selectGameMode('timed')">⏱️ 限时模式</button>
            </div>
            <button class="mode-btn survival" onclick="selectGameMode('survival')">💀 生存模式</button>
        </div>
        
        <!-- 难度选择 -->
        <div class="difficulty-select">
            <button class="difficulty-btn easy" onclick="selectDifficulty('easy')">简单</button>
            <button class="difficulty-btn normal selected" onclick="selectDifficulty('normal')">正常</button>
            <button class="difficulty-btn hard" onclick="selectDifficulty('hard')">困难</button>
        </div>
        
        <!-- 开始游戏按钮 -->
        <button class="start-game-btn" onclick="startGameFromMenu()">开始游戏</button>
        
        <!-- 食物图例 -->
        <div class="legend">
            <div class="legend-item"><span class="legend-color" style="background:#ff6b6b"></span>普通 +10</div>
            <div class="legend-item"><span class="legend-color" style="background:#a855f7"></span>稀有 +20</div>
            <div class="legend-item"><span class="legend-color" style="background:#ffd700"></span>传奇 +50</div>
        </div>
    </div>
    
    <!-- 成就通知 -->
    <div class="achievement-popup" id="achievementPopup">
        <h4>🏆 成就解锁!</h4>
        <p id="achievementText">首次得分 100 分</p>
    </div>
    
    <!-- 计时器显示 -->
    <div class="timer-display" id="timerDisplay">⏱️ <span id="timerValue">60</span>s</div>

    <div class="game-container">
        <h1>🐍 贪吃蛇</h1>
        
        <div class="score-board">
            <div class="score-item">得分：<span id="score">0</span></div>
            <div class="score-item">最高：<span id="highScore">0</span></div>
            <div class="score-item">难度：<span id="difficulty">正常</span></div>
            <div class="score-item">速度：<span id="gameSpeed">150</span>ms</div>
            <div class="score-item" style="cursor: pointer;" onclick="openSettings()" title="设置">⚙️</div>
        </div>
        
        <canvas id="gameCanvas" width="300" height="300"></canvas>
        
        <div class="combo-display" id="comboDisplay">连击 x<span id="comboCount">0</span>!</div>
        
        <div class="power-up-indicator" id="powerUpIndicator"></div>
        
        <div class="controls">
            <!-- 第一行：上 -->
            <div></div>
            <button class="btn" id="btnUp">↑</button>
            <div></div>
            
            <!-- 第二行：左、暂停、右 -->
            <button class="btn" id="btnLeft">←</button>
            <button class="btn btn-secondary" id="btnPause" style="font-size: 14px;">暂停</button>
            <button class="btn" id="btnRight">→</button>
            
            <!-- 第三行：下 -->
            <div></div>
            <button class="btn" id="btnDown">↓</button>
            <div></div>
        </div>
    </div>
    
    <!-- 暂停菜单 -->
    <div class="pause-menu" id="pauseMenu">
        <h2>游戏暂停</h2>
        <button class="btn btn-secondary" onclick="resumeGame()">继续</button>
        <button class="btn btn-secondary" onclick="restartGame()">重新开始</button>
        <button class="btn" onclick="quitToMenu()">退出</button>
    </div>
    
    <!-- 游戏结束界面 -->
    <div class="game-over" id="gameOver">
        <h2>游戏结束!</h2>
        
        <!-- 统计面板 -->
        <div class="stats-panel">
            <div class="stat-row">
                <span class="stat-label">本局得分</span>
                <span class="stat-value highlight" id="statScore">0</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">最高纪录</span>
                <span class="stat-value" id="statHighScore">0</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">蛇长度</span>
                <span class="stat-value" id="statLength">0</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">最大连击</span>
                <span class="stat-value" id="statCombo">0x</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">游戏时间</span>
                <span class="stat-value" id="statTime">0s</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">道具收集</span>
                <span class="stat-value" id="statPowerUps">0</span>
            </div>
        </div>
        
        <p style="margin-bottom: 15px;">
