<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>贪吃蛇 - 经典增强版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            touch-action: none;
            overflow: hidden;
        }
        
        .game-container {
            text-align: center;
            padding: 15px 10px;
            max-width: 100%;
            max-height: 100vh;
            overflow-y: auto;
        }
        
        h1 {
            color: #00ff88;
            margin-bottom: 8px;
            font-size: 24px;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }
        
        .score-board {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 10px;
            color: #fff;
            font-size: 14px;
            flex-wrap: wrap;
        }
        
        .score-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 6px 12px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.2s;
            white-space: nowrap;
        }
        
        .score-item:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(1.05);
        }
        
        .score-item:active {
            transform: scale(0.95);
        }
        
        #gameCanvas {
            border: 3px solid #00ff88;
            border-radius: 10px;
            background: #0a0a1a;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
            max-width: 100%;
            max-height: calc(100vh - 350px);
            touch-action: none;
        }
        
        /* 响应式适配 */
        @media (max-height: 700px) {
            .controls {
                grid-template-columns: repeat(3, 50px);
                grid-template-rows: repeat(3, 50px);
                gap: 10px;
            }
            .btn {
                width: 50px;
                height: 50px;
                font-size: 18px;
            }
            h1 {
                font-size: 20px;
            }
            .score-board {
                font-size: 12px;
                gap: 6px;
            }
            .score-item {
                padding: 4px 10px;
            }
        }
        
        .controls {
            margin-top: 20px;
            display: grid;
            grid-template-columns: repeat(3, 55px);
            grid-template-rows: repeat(3, 55px);
            gap: 12px;
            justify-content: center;
            align-items: center;
        }
        
        .btn {
            width: 55px;
            height: 55px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(145deg, #00ff88, #00cc6a);
            color: #1a1a2e;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 3px 10px rgba(0, 255, 136, 0.4);
            transition: all 0.1s;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        
        .btn:active {
            transform: scale(0.95);
            box-shadow: 0 2px 10px rgba(0, 255, 136, 0.3);
        }
        
        .btn-secondary {
            background: linear-gradient(145deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-small {
            width: 50px;
            height: 50px;
            font-size: 16px;
        }
        
        /* 开始界面 */
        .start-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }
        
        .start-screen h1 {
            font-size: 42px;
            margin-bottom: 30px;
        }
        
        .difficulty-select {
            margin-bottom: 30px;
        }
        
        .difficulty-btn {
            padding: 15px 40px;
            margin: 10px;
            font-size: 18px;
            width: 200px;
        }
        
        .difficulty-btn.easy {
            background: linear-gradient(145deg, #00ff88, #00cc6a);
        }
        
        .difficulty-btn.normal {
            background: linear-gradient(145deg, #ffd700, #ffaa00);
        }
        
        .difficulty-btn.hard {
            background: linear-gradient(145deg, #ff4444, #cc0000);
        }
        
        .difficulty-btn.selected {
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.5);
        }
        
        /* 暂停菜单 */
        .pause-menu {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            padding: 40px;
            border-radius: 20px;
            border: 2px solid #667eea;
            text-align: center;
            color: white;
            display: none;
            z-index: 150;
        }
        
        .pause-menu h2 {
            color: #667eea;
            font-size: 32px;
            margin-bottom: 30px;
        }
        
        .pause-menu .btn {
            margin: 10px;
            width: 150px;
        }
        
        /* 游戏结束界面 */
        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            padding: 40px;
            border-radius: 20px;
            border: 2px solid #ff4444;
            text-align: center;
            color: white;
            display: none;
            z-index: 100;
        }
        
        .game-over h2 {
            color: #ff4444;
            font-size: 32px;
            margin-bottom: 20px;
        }
        
        .game-over p {
            font-size: 20px;
            margin-bottom: 15px;
        }
        
        .combo-display {
            position: fixed;
            top: 20%;
            right: 20px;
            background: linear-gradient(145deg, #ff6b6b, #ee5a5a);
            padding: 15px 25px;
            border-radius: 30px;
            color: white;
            font-size: 24px;
            font-weight: bold;
            display: none;
            animation: pulse 0.5s ease-in-out infinite;
            z-index: 50;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .power-up-indicator {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 50;
        }
        
        .power-up-badge {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #fff;
            border-radius: 10px;
            padding: 8px 15px;
            color: white;
            font-size: 14px;
            animation: fadeIn 0.3s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* 屏幕震动动画 */
        @keyframes shake {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(-5px, 5px); }
            50% { transform: translate(5px, -5px); }
            75% { transform: translate(-5px, -5px); }
        }
        
        .shake {
            animation: shake 0.3s ease-in-out;
        }
        
        /* 设置面板 */
        .settings-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            padding: 30px;
            border-radius: 20px;
            border: 2px solid #667eea;
            text-align: center;
            color: white;
            display: none;
            z-index: 150;
            min-width: 300px;
        }
        
        .settings-panel h2 {
            color: #667eea;
            margin-bottom: 20px;
        }
        
        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 15px 0;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }
        
        .toggle-switch {
            width: 50px;
            height: 26px;
            background: #666;
            border-radius: 13px;
            position: relative;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .toggle-switch.on {
            background: #00ff88;
        }
        
        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 22px;
            height: 22px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: transform 0.3s;
        }
        
        .toggle-switch.on::after {
            transform: translateX(24px);
        }
        
        .legend {
            margin-top: 15px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            font-size: 12px;
            color: #aaa;
        }
        
        .legend-item {
            display: inline-block;
            margin: 5px 10px;
        }
        
        .legend-color {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 5px;
        }
    </style>
</head>
<body>
    <!-- 开始界面 -->
    <div class="start-screen" id="startScreen">
        <h1>🐍 贪吃蛇</h1>
        <div class="difficulty-select">
            <button class="btn difficulty-btn easy" onclick="selectDifficulty('easy')">简单</button>
            <button class="btn difficulty-btn normal selected" onclick="selectDifficulty('normal')">正常</button>
            <button class="btn difficulty-btn hard" onclick="selectDifficulty('hard')">困难</button>
        </div>
        <button class="btn difficulty-btn btn-secondary" onclick="startGameFromMenu()">开始游戏</button>
        <div class="legend">
            <div class="legend-item"><span class="legend-color" style="background:#ff6b6b"></span>普通 +10</div>
            <div class="legend-item"><span class="legend-color" style="background:#a855f7"></span>稀有 +20</div>
            <div class="legend-item"><span class="legend-color" style="background:#ffd700"></span>传奇 +50</div>
        </div>
    </div>

    <div class="game-container">
        <h1>🐍 贪吃蛇</h1>
        
        <div class="score-board">
            <div class="score-item">得分：<span id="score">0</span></div>
            <div class="score-item">最高：<span id="highScore">0</span></div>
            <div class="score-item">难度：<span id="difficulty">正常</span></div>
            <div class="score-item">速度：<span id="gameSpeed">150</span>ms</div>
            <div class="score-item" style="cursor: pointer;" onclick="openSettings()" title="设置">⚙️</div>
        </div>
        
        <canvas id="gameCanvas" width="300" height="300"></canvas>
        
        <div class="combo-display" id="comboDisplay">连击 x<span id="comboCount">0</span>!</div>
        
        <div class="power-up-indicator" id="powerUpIndicator"></div>
        
        <div class="controls">
            <!-- 第一行：上 -->
            <div></div>
            <button class="btn" id="btnUp">↑</button>
            <div></div>
            
            <!-- 第二行：左、暂停、右 -->
            <button class="btn" id="btnLeft">←</button>
            <button class="btn btn-secondary" id="btnPause" style="font-size: 14px;">暂停</button>
            <button class="btn" id="btnRight">→</button>
            
            <!-- 第三行：下 -->
            <div></div>
            <button class="btn" id="btnDown">↓</button>
            <div></div>
        </div>
    </div>
    
    <!-- 暂停菜单 -->
    <div class="pause-menu" id="pauseMenu">
        <h2>游戏暂停</h2>
        <button class="btn btn-secondary" onclick="resumeGame()">继续</button>
        <button class="btn btn-secondary" onclick="restartGame()">重新开始</button>
        <button class="btn" onclick="quitToMenu()">退出</button>
    </div>
    
    <!-- 游戏结束界面 -->
    <div class="game-over" id="gameOver">
        <h2>游戏结束!</h2>
        <p>得分：<span id="finalScore">0</span></p>
        <p>最高分：<span id="finalHighScore">0</span></p>
        <button class="btn btn-secondary" onclick="playAgain()">再来一局</button>
        <button class="btn" onclick="quitToMenu()">返回主菜单</button>
    </div>
    
    <!-- 设置面板 -->
    <div class="settings-panel" id="settingsPanel">
        <h2>⚙️ 设置</h2>
        <div class="setting-item">
            <span>音效开关</span>
            <div class="toggle-switch" id="soundToggle" onclick="toggleSound()"></div>
        </div>
        <div class="setting-item">
            <span>音效音量</span>
            <input type="range" id="volumeSlider" min="0" max="100" value="30" 
                onchange="updateVolume(this.value)" style="width: 120px;">
        </div>
        <div class="setting-item">
            <span>背景音乐</span>
            <input type="range" id="bgmSlider" min="0" max="50" value="15" 
                onchange="updateBGMVolume(this.value)" style="width: 120px;">
        </div>
        <button class="btn btn-secondary" onclick="closeSettings()" style="margin-top: 20px;">关闭</button>
    </div>

    <script>
        // ==================== 游戏配置 ====================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gridSize = 15;
        const tileCount = canvas.width / gridSize;
        
        // ==================== 粒子系统 ====================
        let particles = [];
        
        // ==================== 音效系统增强版 ====================
        const soundSettings = {
            enabled: true,
            volume: 0.3,
            bgmVolume: 0.15,
            toggle: function() {
                this.enabled = !this.enabled;
                localStorage.setItem('snakeSoundEnabled', this.enabled);
                if (this.enabled) {
                    initBGM();
                } else {
                    stopBGM();
                }
            }
        };
        
        // 初始化音效设置
        const savedSound = localStorage.getItem('snakeSoundEnabled');
        if (savedSound !== null) {
            soundSettings.enabled = savedSound === 'true';
        }
        
        // 音频上下文
        let audioCtx = null;
        let bgmOscillators = [];
        let bgmGain = null;
        let isBGMPlaying = false;
        
        // 初始化音频上下文（用户交互后调用）
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }
        
        // 背景音乐 - 轻松的 ambient 音乐
        function initBGM() {
            if (!soundSettings.enabled || isBGMPlaying) return;
            initAudio();
            
            stopBGM();
            bgmGain = audioCtx.createGain();
            bgmGain.gain.value = soundSettings.bgmVolume;
            bgmGain.connect(audioCtx.destination);
            
            // 创建和弦进行（C - G - Am - F）
            const chordProgression = [
                [261.63, 329.63, 392.00],  // C major
                [392.00, 493.88, 587.33],  // G major
                [440.00, 523.25, 659.25],  // A minor
                [349.23, 440.00, 523.25]   // F major
            ];
            
            let chordIndex = 0;
            const chordDuration = 2000; // 每个和弦 2 秒
            
            function playChord() {
                if (!isBGMPlaying) return;
                const chord = chordProgression[chordIndex];
                chord.forEach((freq, i) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.value = freq;
                    gain.gain.setValueAtTime(0, audioCtx.currentTime);
                    gain.gain.linearRampToValueAtTime(0.1, audioCtx.currentTime + 0.1);
                    gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + chordDuration/1000);
                    osc.connect(gain);
                    gain.connect(bgmGain);
                    osc.start(audioCtx.currentTime);
                    osc.stop(audioCtx.currentTime + chordDuration/1000);
                    bgmOscillators.push(osc);
                });
                chordIndex = (chordIndex + 1) % chordProgression.length;
            }
            
            // 每 2 秒播放一个和弦
            playChord();
            const bgmInterval = setInterval(() => {
                if (!isBGMPlaying) {
                    clearInterval(bgmInterval);
                    return;
                }
                playChord();
            }, chordDuration);
            
            isBGMPlaying = true;
        }
        
        function stopBGM() {
            bgmOscillators.forEach(osc => {
                try { osc.stop(); } catch(e) {}
            });
            bgmOscillators = [];
            if (bgmGain) {
                bgmGain.disconnect();
                bgmGain = null;
            }
            isBGMPlaying = false;
        }
        
        // 增强的音效系统
        function playSound(type) {
            if (!soundSettings.enabled) return;
            initAudio();
            
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            gainNode.gain.value = soundSettings.volume;
            
            switch(type) {
                case 'eat':
                    // 吃食物：清脆的"叮"声（双音）
                    oscillator.type = 'sine';
                    oscillator.frequency.setValueAtTime(880, audioCtx.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(1760, audioCtx.currentTime + 0.08);
                    gainNode.gain.setValueAtTime(soundSettings.volume, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                    oscillator.start(audioCtx.currentTime);
                    oscillator.stop(audioCtx.currentTime + 0.2);
                    
                    // 添加和声
                    const harmony = audioCtx.createOscillator();
                    const harmGain = audioCtx.createGain();
                    harmony.type = 'sine';
                    harmony.frequency.setValueAtTime(1100, audioCtx.currentTime);
                    harmony.frequency.exponentialRampToValueAtTime(2200, audioCtx.currentTime + 0.08);
                    harmGain.gain.setValueAtTime(soundSettings.volume * 0.5, audioCtx.currentTime);
                    harmGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                    harmony.connect(harmGain);
                    harmGain.connect(audioCtx.destination);
                    harmony.start(audioCtx.currentTime);
                    harmony.stop(audioCtx.currentTime + 0.15);
                    break;
                    
                case 'turn':
                    // 转向：轻微"滴"声
                    oscillator.type = 'triangle';
                    oscillator.frequency.setValueAtTime(660, audioCtx.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.05);
                    gainNode.gain.setValueAtTime(soundSettings.volume * 0.4, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                    oscillator.start(audioCtx.currentTime);
                    oscillator.stop(audioCtx.currentTime + 0.1);
                    break;
                    
                case 'powerup':
                    // 吃到道具：上升的"嘀嘀"声（三段音阶）
                    oscillator.type = 'square';
                    oscillator.frequency.setValueAtTime(523, audioCtx.currentTime);
                    oscillator.frequency.linearRampToValueAtTime(784, audioCtx.currentTime + 0.1);
                    oscillator.frequency.linearRampToValueAtTime(1047, audioCtx.currentTime + 0.2);
                    gainNode.gain.setValueAtTime(soundSettings.volume * 0.5, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                    oscillator.start(audioCtx.currentTime);
                    oscillator.stop(audioCtx.currentTime + 0.3);
                    break;
                    
                case 'start':
                    // 游戏开始：上升音阶
                    const startFreqs = [523, 659, 784, 1047];
                    startFreqs.forEach((freq, i) => {
                        const osc = audioCtx.createOscillator();
                        const gain = audioCtx.createGain();
                        osc.type = 'sine';
                        osc.frequency.value = freq;
                        gain.gain.setValueAtTime(0, audioCtx.currentTime + i * 0.1);
                        gain.gain.linearRampToValueAtTime(soundSettings.volume, audioCtx.currentTime + i * 0.1 + 0.05);
                        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.1 + 0.2);
                        osc.connect(gain);
                        gain.connect(audioCtx.destination);
                        osc.start(audioCtx.currentTime + i * 0.1);
                        osc.stop(audioCtx.currentTime + i * 0.1 + 0.2);
                    });
                    return;
                    
                case 'pause':
                    // 暂停：下降音
                    oscillator.type = 'triangle';
                    oscillator.frequency.setValueAtTime(880, audioCtx.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(440, audioCtx.currentTime + 0.15);
                    gainNode.gain.setValueAtTime(soundSettings.volume * 0.5, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                    oscillator.start(audioCtx.currentTime);
                    oscillator.stop(audioCtx.currentTime + 0.2);
                    break;
                    
                case 'gameover':
                    // 游戏结束：长下降音
                    oscillator.type = 'sawtooth';
                    oscillator.frequency.setValueAtTime(440, audioCtx.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(55, audioCtx.currentTime + 0.8);
                    gainNode.gain.setValueAtTime(soundSettings.volume * 0.6, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.0);
                    oscillator.start(audioCtx.currentTime);
                    oscillator.stop(audioCtx.currentTime + 1.0);
                    stopBGM();
                    break;
            }
        }
        
        // ==================== 震动反馈 ====================
        function vibrate(pattern) {
            if (navigator.vibrate) {
                navigator.vibrate(pattern);
            }
        }
        
        function createParticles(x, y, color, count = 8) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: x * gridSize + gridSize / 2,
                    y: y * gridSize + gridSize / 2,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8,
                    life: 1.0,
                    decay: 0.02 + Math.random() * 0.03,
                    color: color,
                    size: 2 + Math.random() * 3
                });
            }
        }
        
        function updateParticles() {
            particles = particles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.2; // 重力
                p.life -= p.decay;
                return p.life > 0;
            });
        }
        
        function drawParticles() {
            particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1.0;
        }
        
        // 难度配置（速度：ms/帧，数值越大越慢）
        const difficultyConfig = {
            easy: { speed: 300, powerUpRate: 0.4, name: '简单' },
            normal: { speed: 220, powerUpRate: 0.25, name: '正常' },
            hard: { speed: 150, powerUpRate: 0.15, name: '困难' }
        };
        
        let currentDifficulty = 'normal';
        
        // 食物类型
        const foodTypes = {
            normal: { color: '#ff6b6b', score: 10, chance: 0.85, glow: '#ff6b6b' },
            rare: { color: '#a855f7', score: 20, chance: 0.10, glow: '#a855f7' },
            legendary: { color: '#ffd700', score: 50, chance: 0.05, glow: '#ffd700', disappearTime: 3000 }
        };
        
        // 道具类型
        const powerUpTypes = {
            speed: { color: '#00ffff', effect: '加速', duration: 5000, icon: '⚡' },
            slow: { color: '#00ff00', effect: '减速', duration: 5000, icon: '🐢' },
            ghost: { color: '#ffffff', effect: '穿墙', duration: 5000, icon: '👻' },
            shrink: { color: '#ff69b4', effect: '缩短', duration: 0, icon: '✂️' }
        };
        
        // ==================== 游戏状态 ====================
        let snake = [];
        let foods = [];
        let powerUps = [];
        let direction = 'right';
        let nextDirection = 'right';
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameLoop = null;
        let animationFrame = null;
        let baseGameSpeed = 150;
        let currentGameSpeed = 150;
        let isGameRunning = false;
        let isPaused = false;
        let combo = 0;
        let lastEatTime = 0;
        let activePowerUps = [];
        let isWallPassThrough = false;
        let lastUpdateTime = 0;
        let foodGlowPhase = 0; // 食物发光动画相位
        
        // ==================== 定时器管理（修复内存泄漏）====================
        let activeTimers = [];
        
        function scheduleTimer(callback, delay) {
            const timerId = setTimeout(() => {
                callback();
                const index = activeTimers.indexOf(timerId);
                if (index > -1) activeTimers.splice(index, 1);
            }, delay);
            activeTimers.push(timerId);
            return timerId;
        }
        
        function clearAllTimers() {
            activeTimers.forEach(id => clearTimeout(id));
            activeTimers = [];
        }
        
        document.getElementById('highScore').textContent = highScore;
        
        // 初始化音效开关状态
        updateSoundToggle();
        
        // ==================== 游戏控制 ====================
        function selectDifficulty(diff) {
            currentDifficulty = diff;
            document.querySelectorAll('.difficulty-btn').forEach(btn => {
                btn.classList.remove('selected');
            });
            document.querySelector(`.difficulty-btn.${diff}`).classList.add('selected');
            document.getElementById('difficulty').textContent = difficultyConfig[diff].name;
            document.getElementById('gameSpeed').textContent = difficultyConfig[diff].speed;
        }
        
        function startGameFromMenu() {
            document.getElementById('startScreen').style.display = 'none';
            initAudio(); // 初始化音频
            playSound('start'); // 播放开始音效
            initBGM(); // 开始背景音乐
            initGame();
            startGame();
        }
        
        function initGame() {
            snake = [
                {x: 5, y: 10},
                {x: 4, y: 10},
                {x: 3, y: 10}
            ];
            direction = 'right';
            nextDirection = 'right';
            score = 0;
            combo = 0;
            foods = [];
            powerUps = [];
            activePowerUps = [];
            isWallPassThrough = false;
            baseGameSpeed = difficultyConfig[currentDifficulty].speed;
            currentGameSpeed = baseGameSpeed;
            document.getElementById('score').textContent = score;
            document.getElementById('comboDisplay').style.display = 'none';
            updatePowerUpIndicator();
            placeFood();
        }
        
        function placeFood() {
            const rand = Math.random();
            let type = 'normal';
            if (rand < foodTypes.legendary.chance) type = 'legendary';
            else if (rand < foodTypes.rare.chance + foodTypes.legendary.chance) type = 'rare';
            
            let newFood;
            do {
                newFood = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount),
                    type: type
                };
            } while (snake.some(segment => segment.x === newFood.x && segment.y === newFood.y));
            
            foods.push(newFood);
            
            // 传奇食物会在 3 秒后消失
            if (type === 'legendary') {
                scheduleTimer(() => {
                    const index = foods.findIndex(f => f === newFood);
                    if (index !== -1) foods.splice(index, 1);
                }, foodTypes.legendary.disappearTime);
            }
            
            // 随机生成道具
            if (Math.random() < difficultyConfig[currentDifficulty].powerUpRate) {
                placePowerUp();
            }
        }
        
        function placePowerUp() {
            const types = Object.keys(powerUpTypes);
            const type = types[Math.floor(Math.random() * types.length)];
            
            let newPowerUp;
            do {
                newPowerUp = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount),
                    type: type
                };
            } while (
                snake.some(segment => segment.x === newPowerUp.x && segment.y === newPowerUp.y) ||
                foods.some(food => food.x === newPowerUp.x && food.y === newPowerUp.y)
            );
            
            powerUps.push(newPowerUp);
            
            // 道具 8 秒后消失
            scheduleTimer(() => {
                const index = powerUps.findIndex(p => p === newPowerUp);
                if (index !== -1) powerUps.splice(index, 1);
            }, 8000);
        }
        
        function activatePowerUp(type) {
            const config = powerUpTypes[type];
            
            if (type === 'shrink') {
                // 立即缩短
                for (let i = 0; i < 3 && snake.length > 2; i++) {
                    snake.pop();
                }
            } else {
                // 持续性效果
                activePowerUps.push({ type, endTime: Date.now() + config.duration });
                
                if (type === 'speed') {
                    currentGameSpeed = baseGameSpeed * 0.8;
                    document.getElementById('gameSpeed').textContent = Math.round(currentGameSpeed);
                } else if (type === 'slow') {
                    currentGameSpeed = baseGameSpeed * 1.2;
                    document.getElementById('gameSpeed').textContent = Math.round(currentGameSpeed);
                } else if (type === 'ghost') {
                    isWallPassThrough = true;
                }
                
                updatePowerUpIndicator();
                
                // 效果结束后恢复
                scheduleTimer(() => {
                    activePowerUps = activePowerUps.filter(p => p.type !== type);
                    if (type === 'speed' || type === 'slow') {
                        currentGameSpeed = baseGameSpeed;
                        document.getElementById('gameSpeed').textContent = Math.round(currentGameSpeed);
                    } else if (type === 'ghost') {
                        isWallPassThrough = false;
                    }
                    updatePowerUpIndicator();
                }, config.duration);
            }
        }
        
        function updatePowerUpIndicator() {
            const container = document.getElementById('powerUpIndicator');
            const now = Date.now();
            activePowerUps = activePowerUps.filter(p => p.endTime > now);
            
            if (activePowerUps.length === 0) {
                container.innerHTML = '';
                return;
            }
            
            container.innerHTML = activePowerUps.map(p => {
                const config = powerUpTypes[p.type];
                const remaining = Math.ceil((p.endTime - now) / 1000);
                return `<div class="power-up-badge">${config.icon} ${remaining}s</div>`;
            }).join('');
        }
        
        function draw() {
            // 清空画布
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制粒子
            drawParticles();
            
            // 绘制网格
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            for (let i = 0; i < tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }
            
            // 绘制蛇
            snake.forEach((segment, index) => {
                const gradient = ctx.createRadialGradient(
                    segment.x * gridSize + gridSize/2,
                    segment.y * gridSize + gridSize/2,
                    0,
                    segment.x * gridSize + gridSize/2,
                    segment.y * gridSize + gridSize/2,
                    gridSize/2
                );
                
                if (index === 0) {
                    gradient.addColorStop(0, '#00ff88');
                    gradient.addColorStop(1, '#00cc6a');
                } else {
                    gradient.addColorStop(0, '#00dd77');
                    gradient.addColorStop(1, '#00aa55');
                }
                
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.roundRect(
                    segment.x * gridSize + 1,
                    segment.y * gridSize + 1,
                    gridSize - 2,
                    gridSize - 2,
                    4
                );
                ctx.fill();
                
                // 绘制蛇眼睛
                if (index === 0) {
                    ctx.fillStyle = '#fff';
                    const eyeSize = 3;
                    const eyeOffset = 4;
                    
                    if (direction === 'right') {
                        ctx.beginPath();
                        ctx.arc(segment.x * gridSize + gridSize - eyeOffset, segment.y * gridSize + 5, eyeSize, 0, Math.PI * 2);
                        ctx.arc(segment.x * gridSize + gridSize - eyeOffset, segment.y * gridSize + gridSize - 5, eyeSize, 0, Math.PI * 2);
                        ctx.fill();
                    } else if (direction === 'left') {
                        ctx.beginPath();
                        ctx.arc(segment.x * gridSize + eyeOffset, segment.y * gridSize + 5, eyeSize, 0, Math.PI * 2);
                        ctx.arc(segment.x * gridSize + eyeOffset, segment.y * gridSize + gridSize - 5, eyeSize, 0, Math.PI * 2);
                        ctx.fill();
                    } else if (direction === 'up') {
                        ctx.beginPath();
                        ctx.arc(segment.x * gridSize + 5, segment.y * gridSize + eyeOffset, eyeSize, 0, Math.PI * 2);
                        ctx.arc(segment.x * gridSize + gridSize - 5, segment.y * gridSize + eyeOffset, eyeSize, 0, Math.PI * 2);
                        ctx.fill();
                    } else if (direction === 'down') {
                        ctx.beginPath();
                        ctx.arc(segment.x * gridSize + 5, segment.y * gridSize + gridSize - eyeOffset, eyeSize, 0, Math.PI * 2);
                        ctx.arc(segment.x * gridSize + gridSize - 5, segment.y * gridSize + gridSize - eyeOffset, eyeSize, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            });
            
            // 绘制食物（带发光动画）
            foods.forEach(food => {
                const config = foodTypes[food.type];
                
                // 发光动画（呼吸效果）
                const glowIntensity = 10 + Math.sin(foodGlowPhase) * 5;
                const pulseSize = (gridSize/2 - 2) + Math.sin(foodGlowPhase * 2) * 1;
                
                // 外发光
                ctx.shadowColor = config.glow;
                ctx.shadowBlur = glowIntensity;
                
                // 食物渐变
                const foodGradient = ctx.createRadialGradient(
                    food.x * gridSize + gridSize/2,
                    food.y * gridSize + gridSize/2,
                    0,
                    food.x * gridSize + gridSize/2,
                    food.y * gridSize + gridSize/2,
                    gridSize/2
                );
                foodGradient.addColorStop(0, config.color);
                foodGradient.addColorStop(1, config.color);
                
                ctx.fillStyle = foodGradient;
                ctx.beginPath();
                ctx.arc(
                    food.x * gridSize + gridSize/2,
                    food.y * gridSize + gridSize/2,
                    pulseSize,
                    0,
                    Math.PI * 2
                );
                ctx.fill();
                ctx.shadowBlur = 0;
            });
            
            // 绘制道具
            powerUps.forEach(powerUp => {
                const config = powerUpTypes[powerUp.type];
                ctx.fillStyle = config.color;
                ctx.font = '12px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(config.icon, 
                    powerUp.x * gridSize + gridSize/2, 
                    powerUp.y * gridSize + gridSize/2);
            });
        }
        
        function update() {
            direction = nextDirection;
            
            // 更新粒子
            updateParticles();
            
            const head = {x: snake[0].x, y: snake[0].y};
            
            switch(direction) {
                case 'up': head.y--; break;
                case 'down': head.y++; break;
                case 'left': head.x--; break;
                case 'right': head.x++; break;
            }
            
            // 检查穿墙模式
            if (isWallPassThrough) {
                if (head.x < 0) head.x = tileCount - 1;
                if (head.x >= tileCount) head.x = 0;
                if (head.y < 0) head.y = tileCount - 1;
                if (head.y >= tileCount) head.y = 0;
            } else {
                // 检查碰撞
                if (head.x < 0 || head.x >= tileCount || 
                    head.y < 0 || head.y >= tileCount ||
                    snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                    gameOver();
                    return;
                }
            }
            
            snake.unshift(head);
            
            // 检查是否吃到食物
            const foodIndex = foods.findIndex(f => f.x === head.x && f.y === head.y);
            if (foodIndex !== -1) {
                const food = foods[foodIndex];
                const config = foodTypes[food.type];
                
                // 连击系统
                const now = Date.now();
                if (now - lastEatTime < 3000) {
                    combo++;
                    if (combo >= 2) {
                        document.getElementById('comboDisplay').style.display = 'block';
                        document.getElementById('comboCount').textContent = combo;
                    }
                } else {
                    combo = 0;
                    document.getElementById('comboDisplay').style.display = 'none';
                }
                lastEatTime = now;
                
                // 计算得分（包含连击加成）
                const comboBonus = combo >= 2 ? 1 + (combo - 1) * 0.2 : 1;
                score += Math.floor(config.score * comboBonus);
                document.getElementById('score').textContent = score;
                
                // 生成粒子效果
                createParticles(food.x, food.y, config.color, 10);
                
                // 播放音效和震动
                playSound('eat');
                vibrate(30);
                
                foods.splice(foodIndex, 1);
                placeFood();
                
                // 渐进加速（每吃 5 个食物加速一次）
                if (score > 0 && score % 50 === 0 && currentGameSpeed > 80) {
                    currentGameSpeed -= 5;
                    document.getElementById('gameSpeed').textContent = Math.round(currentGameSpeed);
                }
            } else {
                snake.pop();
            }
            
            // 检查是否吃到道具
            const powerUpIndex = powerUps.findIndex(p => p.x === head.x && p.y === head.y);
            if (powerUpIndex !== -1) {
                const powerUp = powerUps[powerUpIndex];
                activatePowerUp(powerUp.type);
                powerUps.splice(powerUpIndex, 1);
                
                // 播放道具音效
                playSound('powerup');
                vibrate([50, 30, 50]);
            }
            
            // 更新道具指示器
            updatePowerUpIndicator();
        }
        
        function gameStep(currentTime) {
            if (!isGameRunning) return;
            
            animationFrame = requestAnimationFrame(gameStep);
            
            // 控制游戏速度
            if (currentTime - lastUpdateTime < currentGameSpeed) return;
            lastUpdateTime = currentTime;
            
            // 更新食物发光动画
            foodGlowPhase += 0.1;
            
            if (!isPaused) {
                update();
                draw();
            }
        }
        
        let canRevive = true;
        
        function gameOver() {
            cancelAnimationFrame(animationFrame);
            clearInterval(gameLoop);
            clearAllTimers();
            isGameRunning = false;
            
            // 屏幕震动效果
            canvas.classList.add('shake');
            setTimeout(() => canvas.classList.remove('shake'), 300);
            
            // 播放音效和震动
            playSound('gameover');
            vibrate([100, 50, 100, 50, 200]);
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                document.getElementById('highScore').textContent = highScore;
            }
            
            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalHighScore').textContent = highScore;
            
            document.getElementById('gameOver').style.display = 'block';
        }
        
        function startGame() {
            if (isGameRunning) return;
            isGameRunning = true;
            isPaused = false;
            lastUpdateTime = 0;
            document.getElementById('btnPause').textContent = '暂停';
            document.getElementById('gameSpeed').textContent = Math.round(currentGameSpeed);
            animationFrame = requestAnimationFrame(gameStep);
        }
        
        function togglePause() {
            if (!isGameRunning) return;
            
            isPaused = !isPaused;
            document.getElementById('btnPause').textContent = isPaused ? '继续' : '暂停';
            document.getElementById('pauseMenu').style.display = isPaused ? 'block' : 'none';
            
            if (isPaused) {
                playSound('pause');
            }
        }
        
        function resumeGame() {
            isPaused = false;
            document.getElementById('pauseMenu').style.display = 'none';
            document.getElementById('btnPause').textContent = '暂停';
            playSound('start'); // 播放继续音效
            initBGM(); // 恢复背景音乐
        }
        
        function restartGame() {
            document.getElementById('pauseMenu').style.display = 'none';
            document.getElementById('gameOver').style.display = 'none';
            currentGameSpeed = baseGameSpeed;
            initGame();
            playSound('start');
            initBGM();
            startGame();
        }
        
        function playAgain() {
            document.getElementById('gameOver').style.display = 'none';
            currentGameSpeed = baseGameSpeed;
            initGame();
            playSound('start');
            initBGM();
            startGame();
        }
        
        function quitToMenu() {
            cancelAnimationFrame(animationFrame);
            clearInterval(gameLoop);
            clearAllTimers();
            isGameRunning = false;
            isPaused = false;
            stopBGM(); // 停止背景音乐
            document.getElementById('pauseMenu').style.display = 'none';
            document.getElementById('gameOver').style.display = 'none';
            document.getElementById('startScreen').style.display = 'flex';
        }
        
        // ==================== 设置功能 ====================
        function openSettings() {
            document.getElementById('settingsPanel').style.display = 'block';
            updateSoundToggle();
            document.getElementById('volumeSlider').value = soundSettings.volume * 100;
            document.getElementById('bgmSlider').value = soundSettings.bgmVolume * 100;
        }
        
        function closeSettings() {
            document.getElementById('settingsPanel').style.display = 'none';
        }
        
        function toggleSound() {
            soundSettings.toggle();
            updateSoundToggle();
        }
        
        function updateVolume(value) {
            soundSettings.volume = value / 100;
            localStorage.setItem('snakeSoundVolume', soundSettings.volume);
        }
        
        function updateBGMVolume(value) {
            soundSettings.bgmVolume = value / 100;
            if (bgmGain) {
                bgmGain.gain.value = soundSettings.bgmVolume;
            }
            localStorage.setItem('snakeBGMVolume', soundSettings.bgmVolume);
        }
        
        function updateSoundToggle() {
            const toggle = document.getElementById('soundToggle');
            if (soundSettings.enabled) {
                toggle.classList.add('on');
            } else {
                toggle.classList.remove('on');
            }
        }
        
        // 加载音量设置
        const savedVolume = localStorage.getItem('snakeSoundVolume');
        if (savedVolume) soundSettings.volume = parseFloat(savedVolume);
        const savedBGMVolume = localStorage.getItem('snakeBGMVolume');
        if (savedBGMVolume) soundSettings.bgmVolume = parseFloat(savedBGMVolume);
        
        function changeDirection(newDirection) {
            const opposites = {
                'up': 'down',
                'down': 'up',
                'left': 'right',
                'right': 'left'
            };
            
            if (opposites[newDirection] !== direction && opposites[newDirection] !== nextDirection) {
                nextDirection = newDirection;
                // 播放转向音效（只在游戏进行中）
                if (isGameRunning && !isPaused) {
                    playSound('turn');
                }
            }
        }
        
        // 按钮事件
        document.getElementById('btnUp').addEventListener('click', () => changeDirection('up'));
        document.getElementById('btnDown').addEventListener('click', () => changeDirection('down'));
        document.getElementById('btnLeft').addEventListener('click', () => changeDirection('left'));
        document.getElementById('btnRight').addEventListener('click', () => changeDirection('right'));
        
        document.getElementById('btnPause').addEventListener('click', togglePause);
        
        // 键盘控制
        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'ArrowUp': case 'w': case 'W': changeDirection('up'); break;
                case 'ArrowDown': case 's': case 'S': changeDirection('down'); break;
                case 'ArrowLeft': case 'a': case 'A': changeDirection('left'); break;
                case 'ArrowRight': case 'd': case 'D': changeDirection('right'); break;
                case ' ': 
                    if (isGameRunning) togglePause();
                    else if (document.getElementById('startScreen').style.display !== 'none') startGameFromMenu();
                    break;
                case 'Escape':
                    if (isGameRunning) togglePause();
                    break;
            }
        });
        
        // 触摸滑动控制（优化灵敏度）
        let touchStartX = 0;
        let touchStartY = 0;
        const SWIPE_THRESHOLD = 50; // 增加滑动阈值，减少误触
        
        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
            e.preventDefault();
        }, {passive: false});
        
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
        }, {passive: false});
        
        canvas.addEventListener('touchend', (e) => {
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            
            const dx = touchEndX - touchStartX;
            const dy = touchEndY - touchStartY;
            
            // 确保滑动距离足够大才响应
            if (Math.abs(dx) < SWIPE_THRESHOLD && Math.abs(dy) < SWIPE_THRESHOLD) {
                return; // 点击而非滑动，忽略
            }
            
            if (Math.abs(dx) > Math.abs(dy)) {
                if (dx > SWIPE_THRESHOLD) changeDirection('right');
                else if (dx < -SWIPE_THRESHOLD) changeDirection('left');
            } else {
                if (dy > SWIPE_THRESHOLD) changeDirection('down');
                else if (dy < -SWIPE_THRESHOLD) changeDirection('up');
            }
            
            e.preventDefault();
        }, {passive: false});
        
        // 初始绘制
        initGame();
        draw();
    </script>
</body>
</html>
